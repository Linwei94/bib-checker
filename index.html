<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BibTeX Reference Checker</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #f0f2f5;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  color: #1f2937;
}

header {
  background: linear-gradient(135deg, #1e40af, #3b82f6);
  color: white;
  padding: 10px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
}
header h1 { font-size: 1rem; font-weight: 700; }
.header-right { display: flex; align-items: center; gap: 10px; }
#stats { display: flex; gap: 6px; font-size: 12px; }
#stats span { background: rgba(255,255,255,0.18); border-radius: 20px; padding: 2px 10px; font-weight: 500; }

.btn-lang {
  background: rgba(255,255,255,0.2);
  color: white;
  border: 1px solid rgba(255,255,255,0.4);
  border-radius: 6px;
  padding: 5px 12px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.15s;
}
.btn-lang:hover { background: rgba(255,255,255,0.3); }

.btn-download {
  background: white;
  color: #1e40af;
  border: none;
  border-radius: 6px;
  padding: 6px 14px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
}
.btn-download:hover { background: #eff6ff; }

.main { display: flex; flex: 1; gap: 10px; padding: 10px; overflow: hidden; }

.left-panel { display: flex; flex-direction: column; width: 42%; gap: 7px; flex-shrink: 0; }
.panel-toolbar { display: flex; align-items: center; justify-content: space-between; }
.panel-toolbar label { font-size: 13px; font-weight: 600; color: #374151; }
.btn-parse {
  background: #1e40af; color: white; border: none; border-radius: 5px;
  padding: 5px 13px; font-size: 12px; font-weight: 600; cursor: pointer;
}
.btn-parse:hover { background: #1d4ed8; }

#bib-textarea {
  flex: 1;
  font-family: 'Courier New', Courier, monospace;
  font-size: 11.5px; line-height: 1.55;
  border: 1px solid #d1d5db; border-radius: 7px;
  padding: 10px; resize: none; outline: none;
  background: #fff; color: #111827;
}
#bib-textarea:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.12); }

.right-panel { flex: 1; display: flex; flex-direction: column; gap: 8px; overflow: hidden; min-width: 0; }

.entry-list-wrap {
  background: white; border: 1px solid #d1d5db; border-radius: 7px;
  overflow-y: auto; max-height: 195px; flex-shrink: 0;
}
.entry-placeholder { color: #9ca3af; font-size: 13px; text-align: center; padding: 18px; font-style: italic; }
.entry-item {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 12px; border-bottom: 1px solid #f3f4f6;
  cursor: pointer; transition: background 0.1s;
}
.entry-item:last-child { border-bottom: none; }
.entry-item:hover { background: #f9fafb; }
.entry-item.active { background: #eff6ff; border-left: 3px solid #3b82f6; padding-left: 9px; }
.entry-badge {
  font-size: 14px; flex-shrink: 0; width: 20px; text-align: center;
  cursor: pointer; border-radius: 3px; padding: 1px;
  transition: background 0.1s;
}
.entry-badge:hover { background: rgba(0,0,0,0.08); }
.entry-badge[title] { cursor: pointer; }
.entry-key { font-family: monospace; font-size: 11px; color: #6b7280; flex-shrink: 0; width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.entry-title-small { font-size: 12px; color: #374151; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.checker-panel {
  background: white; border: 1px solid #d1d5db; border-radius: 7px;
  padding: 14px; flex: 1; display: flex; flex-direction: column;
  gap: 10px; overflow-y: auto;
}
.checker-placeholder { color: #9ca3af; font-size: 13px; text-align: center; padding: 30px 0; font-style: italic; }

.entry-info {
  background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 6px;
  padding: 10px 12px; font-size: 12.5px; line-height: 1.65;
}
.entry-info .info-title { font-weight: 700; color: #111827; margin-bottom: 5px; font-size: 13px; }
.entry-info .info-row { color: #4b5563; }
.entry-info code { background: #e5e7eb; border-radius: 3px; padding: 1px 5px; font-size: 11px; color: #374151; }

.btn-row { display: flex; gap: 8px; }
.btn {
  flex: 1; padding: 8px 10px; border: none; border-radius: 6px;
  font-size: 13px; font-weight: 600; cursor: pointer;
  transition: opacity 0.15s, transform 0.1s;
}
.btn:hover { opacity: 0.88; }
.btn:active { transform: scale(0.97); }
.btn-scholar  { background: #4285f4; color: white; }
.btn-semantic { background: #7c3aed; color: white; }
.btn-replace  { background: #059669; color: white; }
.btn-keep     { background: #e5e7eb; color: #374151; }
.btn-nav      { background: #f3f4f6; color: #374151; font-size: 12px; padding: 6px 10px; flex: 0 0 auto; }
.btn-undo     { background: #fef3c7; color: #92400e; font-size: 12px; padding: 6px 10px; flex: 0 0 auto; }
.btn-undo:disabled { opacity: 0.35; cursor: not-allowed; }
.btn-undo:disabled:hover { opacity: 0.35; }

.field-label { font-size: 12px; font-weight: 600; color: #374151; display: block; margin-bottom: 4px; }

#new-bib {
  width: 100%; font-family: 'Courier New', Courier, monospace;
  font-size: 11.5px; line-height: 1.5;
  border: 1px solid #d1d5db; border-radius: 6px;
  padding: 8px 10px; resize: vertical; outline: none;
  min-height: 130px; background: #fafafa;
}
#new-bib:focus { border-color: #3b82f6; background: white; box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }

.keep-key-row { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #6b7280; }
.keep-key-row code { background: #e5e7eb; border-radius: 3px; padding: 1px 5px; font-size: 11px; color: #374151; }

.nav-row { display: flex; align-items: center; gap: 6px; }
#progress-text { flex: 1; text-align: center; font-size: 12px; color: #9ca3af; font-weight: 500; }

/* ── Search side panel (画中画 launcher) ─────────────────────── */
#search-panel {
  position: fixed;
  top: 0; right: -380px;
  width: 360px; height: 100vh;
  background: white;
  border-left: 2px solid #3b82f6;
  box-shadow: -6px 0 24px rgba(0,0,0,0.18);
  display: flex; flex-direction: column;
  z-index: 1000;
  transition: right 0.3s cubic-bezier(.4,0,.2,1);
}
#search-panel.open { right: 0; }

.sp-header {
  background: linear-gradient(135deg, #1e40af, #3b82f6);
  color: white; padding: 9px 13px;
  display: flex; align-items: center; gap: 8px; flex-shrink: 0;
}
.sp-header-title { font-size: 13px; font-weight: 700; flex: 1; }
.sp-close {
  background: rgba(255,255,255,0.2); border: none; color: white;
  border-radius: 5px; padding: 4px 10px; font-size: 13px;
  cursor: pointer; font-weight: 700; flex-shrink: 0;
}
.sp-close:hover { background: rgba(255,255,255,0.35); }

.sp-tabs {
  display: flex; border-bottom: 1px solid #e2e8f0;
  flex-shrink: 0; background: #f8fafc;
}
.sp-tab {
  flex: 1; padding: 7px 8px; font-size: 12px; font-weight: 600;
  border: none; background: none; cursor: pointer; color: #6b7280;
  border-bottom: 2px solid transparent; transition: all 0.15s;
}
.sp-tab.active { color: #1e40af; border-bottom-color: #3b82f6; background: white; }
.sp-tab:hover:not(.active) { background: #f0f0f0; }

.sp-body {
  flex: 1; padding: 16px 14px; display: flex; flex-direction: column;
  gap: 14px; overflow-y: auto;
}

.sp-paper-box {
  background: #f0f7ff; border: 1px solid #bfdbfe; border-radius: 7px;
  padding: 10px 12px;
}
.sp-paper-label { font-size: 10px; font-weight: 700; color: #3b82f6; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 4px; }
.sp-paper-title { font-size: 12.5px; font-weight: 600; color: #1e3a5f; line-height: 1.5; }

.sp-side-btn {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  width: 100%; padding: 11px 14px; border: none; border-radius: 8px;
  font-size: 14px; font-weight: 700; cursor: pointer; text-decoration: none;
  transition: opacity 0.15s, transform 0.1s;
}
.sp-side-btn:hover { opacity: 0.88; }
.sp-side-btn:active { transform: scale(0.98); }
.sp-side-scholar  { background: #4285f4; color: white; }
.sp-side-semantic { background: #7c3aed; color: white; }

.sp-side-hint {
  font-size: 11px; color: #9ca3af; text-align: center; margin-top: -8px; line-height: 1.5;
}

.sp-divider { border: none; border-top: 1px solid #f0f0f0; margin: 0; }

.sp-steps-title { font-size: 11px; font-weight: 700; color: #374151; text-transform: uppercase; letter-spacing: .05em; }
.sp-steps { display: flex; flex-direction: column; gap: 6px; }
.sp-step {
  display: flex; align-items: flex-start; gap: 8px; font-size: 12px; color: #4b5563; line-height: 1.5;
}
.sp-step-num {
  background: #3b82f6; color: white; border-radius: 50%;
  width: 18px; height: 18px; font-size: 10px; font-weight: 700;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px;
}

.sp-url-row { display: flex; gap: 6px; align-items: center; }
.sp-url-display {
  flex: 1; font-family: monospace; font-size: 10.5px; color: #6b7280;
  background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 5px;
  padding: 4px 7px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.sp-copy-btn {
  background: #f3f4f6; color: #374151; border: 1px solid #d1d5db;
  border-radius: 5px; padding: 4px 9px; font-size: 11px; font-weight: 600;
  cursor: pointer; white-space: nowrap; flex-shrink: 0;
}
.sp-copy-btn:hover { background: #e5e7eb; }

/* ── Overlay dim when panel open ──────────────────────────────── */
#sp-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.15);
  z-index: 999; display: none;
}
#sp-overlay.show { display: block; }

/* ── Diff view ───────────────────────────────────────────────── */
#diff-view {
  display: none; border: 1px solid #e2e8f0; border-radius: 6px;
  padding: 8px 10px; background: #f8fafc; font-size: 11.5px;
  max-height: 180px; overflow-y: auto;
}
.diff-title { font-size: 11px; font-weight: 700; color: #374151; margin-bottom: 6px; text-transform: uppercase; letter-spacing: .04em; }
.diff-table { width: 100%; border-collapse: collapse; }
.diff-table td { padding: 2px 5px; vertical-align: top; line-height: 1.45; }
.diff-field { font-family: monospace; font-weight: 700; color: #374151; width: 64px; flex-shrink: 0; }
.diff-arrow { color: #9ca3af; width: 14px; text-align: center; }
.diff-old  { color: #991b1b; max-width: 0; width: 42%; word-break: break-all; }
.diff-new  { color: #065f46; max-width: 0; width: 42%; word-break: break-all; }
.diff-changed .diff-old { background: #fff7ed; border-radius: 3px; }
.diff-changed .diff-new { background: #ecfdf5; border-radius: 3px; }
.diff-added   .diff-new { background: #d1fae5; border-radius: 3px; }
.diff-removed .diff-old { background: #fee2e2; border-radius: 3px; }
.diff-same-msg { color: #059669; font-size: 12px; }

.toast {
  position: fixed; bottom: 20px; right: 20px;
  background: #1e293b; color: white;
  padding: 9px 16px; border-radius: 8px; font-size: 13px;
  opacity: 0; transform: translateY(8px);
  transition: all 0.2s; pointer-events: none; z-index: 1001;
}
.toast.show { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<header>
  <h1 data-i18n="title">📚 BibTeX Reference Checker</h1>
  <div class="header-right">
    <div id="stats"></div>
    <button class="btn-lang" onclick="toggleLang()" id="lang-btn">中文</button>
    <button class="btn-download" onclick="downloadBib()" data-i18n="download">⬇ Download .bib</button>
  </div>
</header>

<div class="main">
  <div class="left-panel">
    <div class="panel-toolbar">
      <label data-i18n="bib-source">BibTeX Source</label>
      <button class="btn-parse" onclick="parseAndRender()" data-i18n="parse-btn">Parse Entries →</button>
    </div>
    <textarea id="bib-textarea" spellcheck="false" data-i18n-placeholder="bib-placeholder"></textarea>
  </div>

  <div class="right-panel">
    <div class="entry-list-wrap" id="entry-list-wrap">
      <div class="entry-placeholder" data-i18n="list-placeholder">Parse entries to begin</div>
    </div>

    <div class="checker-panel" id="checker-panel">
      <div class="checker-placeholder" id="checker-placeholder" data-i18n="checker-placeholder">
        Select an entry from the list above to check it
      </div>

      <div id="active-checker" style="display:none; flex-direction:column; gap:10px; flex:1;">
        <div class="entry-info" id="entry-info"></div>

        <div class="btn-row">
          <button class="btn btn-scholar"  onclick="openSearch('scholar')"  data-i18n="btn-scholar">🔍 Google Scholar</button>
          <button class="btn btn-semantic" onclick="openSearch('semantic')" data-i18n="btn-semantic">📖 Semantic Scholar</button>
        </div>

        <div>
          <label class="field-label" for="new-bib" data-i18n="new-bib-label">Paste new BibTeX (Scholar → Cite → BibTeX):</label>
          <textarea id="new-bib" rows="7" data-i18n-placeholder="new-bib-placeholder" oninput="updateDiffView()"></textarea>
        </div>

        <div id="diff-view"></div>

        <div class="keep-key-row">
          <input type="checkbox" id="keep-key" checked>
          <label for="keep-key" data-i18n="keep-key-label">Keep original key:</label>
          <code id="key-display"></code>
        </div>

        <div class="btn-row">
          <button class="btn btn-replace" onclick="replaceEntry()" data-i18n="btn-replace">✅ Replace Entry</button>
          <button class="btn btn-keep"    onclick="keepOriginal()" data-i18n="btn-keep">👍 Keep Original</button>
        </div>

        <div class="nav-row">
          <button class="btn btn-nav"  onclick="navigate(-1)" data-i18n="btn-prev">← Prev</button>
          <span id="progress-text">0 / 0</span>
          <button class="btn btn-nav"  onclick="navigate(1)"  data-i18n="btn-next">Next →</button>
          <button class="btn btn-undo" onclick="undoState()"  data-i18n="btn-undo" id="undo-btn" disabled>↩ Undo</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Search side panel (画中画 launcher) -->
<div id="sp-overlay" onclick="closeSearchPanel()"></div>
<div id="search-panel">
  <div class="sp-header">
    <span class="sp-header-title" data-i18n="sp-panel-title">🔍 Search Reference</span>
    <button class="sp-close" onclick="closeSearchPanel()">✕</button>
  </div>
  <div class="sp-tabs">
    <button class="sp-tab active" id="sp-tab-scholar"  onclick="switchTab('scholar')"  data-i18n="btn-scholar">🔍 Google Scholar</button>
    <button class="sp-tab"        id="sp-tab-semantic" onclick="switchTab('semantic')" data-i18n="btn-semantic">📖 Semantic Scholar</button>
  </div>
  <div class="sp-body">
    <div class="sp-paper-box">
      <div class="sp-paper-label" data-i18n="sp-searching">Searching for</div>
      <div class="sp-paper-title" id="sp-paper-title"></div>
    </div>

    <button class="sp-side-btn sp-side-scholar" id="sp-side-scholar-btn" onclick="openSideWindow('scholar')" data-i18n="sp-open-scholar">
      🔍 Open Google Scholar
    </button>
    <button class="sp-side-btn sp-side-semantic" id="sp-side-semantic-btn" onclick="openSideWindow('semantic')" style="display:none" data-i18n="sp-open-semantic">
      📖 Open Semantic Scholar
    </button>
    <div class="sp-side-hint" data-i18n="sp-side-hint">Opens snapped to the right side of your screen</div>

    <hr class="sp-divider">

    <div class="sp-steps-title" data-i18n="sp-steps-title">How to get BibTeX</div>
    <div class="sp-steps" id="sp-steps">
      <!-- populated by JS based on active tab -->
    </div>

    <div class="sp-url-row">
      <div class="sp-url-display" id="sp-url-display"></div>
      <button class="sp-copy-btn" onclick="copySearchUrl()" data-i18n="sp-copy">Copy URL</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

    'toast-replaced':     '✅ 条目已替换',
    'toast-nothing':      '没有内容可下载',
    'toast-downloading':  '正在下载 main.bib',
    'toast-undo':         '↩ 已撤销',
    'toast-no-undo':      '没有可撤销的操作',
    'toast-copied-url':   '链接已复制到剪贴板',
    'stats-pending':      n => `⏳ ${n} 待检查`,
    'stats-ok':           n => `✅ ${n} 已确认`,
    'stats-replaced':     n => `🔄 ${n} 已替换`,
    'lang-btn':           'English',
  }
};

let lang = 'en';

function t(key, ...args) {
  const v = I18N[lang][key];
  return typeof v === 'function' ? v(...args) : (v || key);
}

function applyLang() {
  document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = t(el.dataset.i18n);
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    el.placeholder = t(el.dataset.i18nPlaceholder);
  });
  if (entries.length === 0) {
    const lp = document.querySelector('#entry-list-wrap .entry-placeholder');
    if (lp) lp.textContent = t('list-placeholder');
  }
  updateStats();
  updateUndoBtn();
}

function toggleLang() {
  lang = lang === 'en' ? 'zh' : 'en';
  applyLang();
  if (entries.length > 0) renderEntryList();
}

// ── State ─────────────────────────────────────────────────────────
let entries = [];
let currentIdx = -1;
let undoHistory = [];   // [{text, statuses}]

// ── BibTeX parser ─────────────────────────────────────────────────
function parseBib(text) {
  const results = [];
  let i = 0;
  while (i < text.length) {
    const at = text.indexOf('@', i);
    if (at === -1) break;
    let j = at + 1;
    while (j < text.length && /\w/.test(text[j])) j++;
    const type = text.slice(at + 1, j).trim().toLowerCase();
    if (!type || type === 'string' || type === 'preamble' || type === 'comment') {
      const ob = text.indexOf('{', j);
      if (ob === -1) break;
      let d = 0, k = ob;
      for (; k < text.length; k++) {
        if (text[k] === '{') d++;
        else if (text[k] === '}') { d--; if (d === 0) { k++; break; } }
      }
      i = k; continue;
    }
    const ob = text.indexOf('{', j);
    if (ob === -1) break;
    let depth = 0, k = ob, inQuote = false;
    for (; k < text.length; k++) {
      const ch = text[k];
      if (ch === '"' && depth === 1) inQuote = !inQuote;
      if (!inQuote) {
        if (ch === '{') depth++;
        else if (ch === '}') { depth--; if (depth === 0) { k++; break; } }
      }
    }
    const raw = text.slice(at, k);
    const comma = raw.indexOf(',');
    if (comma === -1) { i = k; continue; }
    const key = raw.slice(raw.indexOf('{') + 1, comma).trim();
    if (!key || /\s/.test(key)) { i = k; continue; }
    const f = extractFields(raw);
    results.push({
      key, type, raw, start: at, end: k,
      title:   cleanStr(f.title   || '(no title)'),
      authors: cleanStr(f.author  || ''),
      year:    (f.year || '').replace(/[{}]/g, '').trim(),
      venue:   cleanStr(f.journal || f.booktitle || f.howpublished || ''),
      status: 'pending',
    });
    i = k;
  }
  return results;
}

function extractFields(raw) {
  const fields = {};
  const re = /\b([a-zA-Z]\w*)\s*=\s*/g;
  let m;
  while ((m = re.exec(raw)) !== null) {
    const name = m[1].toLowerCase();
    const pos = m.index + m[0].length;
    const ch = raw[pos];
    let val = '';
    if (ch === '{') {
      let d = 0, j = pos;
      for (; j < raw.length; j++) {
        if (raw[j] === '{') d++;
        else if (raw[j] === '}') { d--; if (d === 0) { j++; break; } }
      }
      val = raw.slice(pos + 1, j - 1);
    } else if (ch === '"') {
      const end = raw.indexOf('"', pos + 1);
      val = end === -1 ? '' : raw.slice(pos + 1, end);
    } else {
      const end = raw.slice(pos).search(/[,}\s]/);
      val = end === -1 ? raw.slice(pos) : raw.slice(pos, pos + end);
    }
    fields[name] = val;
  }
  return fields;
}

function cleanStr(s) {
  if (!s) return '';
  return s.replace(/\{\\['"` ^~cduHkrtvb]\s*\{?([a-zA-Z])\}?\}/g, '$1')
          .replace(/\\[a-zA-Z]+\s*/g, '')
          .replace(/[{}\\"]/g, '')
          .replace(/\s+/g, ' ').trim();
}

// ── Parse & render ────────────────────────────────────────────────
function reparsePreservingStatus() {
  const sm = {};
  entries.forEach(e => { sm[e.key] = e.status; });
  entries = parseBib(document.getElementById('bib-textarea').value);
  entries.forEach(e => { if (sm[e.key]) e.status = sm[e.key]; });
}

function parseAndRender() {
  const text = document.getElementById('bib-textarea').value;
  if (!text.trim()) { showToast(t('toast-no-content')); return; }
  entries = parseBib(text);
  if (entries.length === 0) { showToast(t('toast-no-entries')); return; }
  undoHistory = [];
  updateUndoBtn();
  renderEntryList();
  selectEntry(0);
  showToast(t('toast-parsed', entries.length));
}

function renderEntryList() {
  const wrap = document.getElementById('entry-list-wrap');
  wrap.innerHTML = '';
  if (entries.length === 0) {
    wrap.innerHTML = `<div class="entry-placeholder">${t('list-placeholder')}</div>`;
    return;
  }
  const hint = t('badge-hint');
  entries.forEach((e, i) => {
    const div = document.createElement('div');
    div.className = 'entry-item' + (i === currentIdx ? ' active' : '');
    div.dataset.idx = i;
    div.onclick = () => selectEntry(i);
    const badge = e.status === 'ok' ? '✅' : e.status === 'replaced' ? '🔄' : '⏳';
    div.innerHTML =
      `<span class="entry-badge" title="${hint}" data-idx="${i}" onclick="toggleStatus(${i},event)">${badge}</span>` +
      `<span class="entry-key" title="${e.key}">${e.key}</span>` +
      `<span class="entry-title-small" title="${e.title}">${e.title}</span>`;
    wrap.appendChild(div);
  });
  updateStats();
}

// ── Toggle status by clicking badge ──────────────────────────────
function toggleStatus(idx, event) {
  event.stopPropagation();
  pushHistory();
  const e = entries[idx];
  if (e.status === 'pending') {
    e.status = 'ok';
  } else if (e.status === 'ok') {
    e.status = 'pending';
  }
  // 'replaced' stays replaced (don't toggle)
  renderEntryList();
  updateStats();
}

// ── Select entry ──────────────────────────────────────────────────
function selectEntry(idx) {
  if (idx < 0 || idx >= entries.length) return;
  currentIdx = idx;
  const e = entries[idx];

  document.querySelectorAll('.entry-item').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
    if (i === idx) el.scrollIntoView({ block: 'nearest' });
  });

  highlightInBib(e);

  document.getElementById('checker-placeholder').style.display = 'none';
  const ac = document.getElementById('active-checker');
  ac.style.display = 'flex';

  const authShort = e.authors.length > 100 ? e.authors.slice(0, 100) + '…' : e.authors;
  document.getElementById('entry-info').innerHTML =
    `<div class="info-title">${e.title}</div>` +
    `<div class="info-row">` +
    (e.authors ? `<b>${lang==='zh'?'作者':'Authors'}:</b> ${authShort}<br>` : '') +
    (e.year    ? `<b>${lang==='zh'?'年份':'Year'}:</b> ${e.year}` : '') +
    (e.year && e.venue ? ' &nbsp;·&nbsp; ' : '') +
    (e.venue   ? `<b>${lang==='zh'?'来源':'Venue'}:</b> ${e.venue.slice(0,80)}` : '') +
    `<br><b>Type:</b> @${e.type} &nbsp; <b>Key:</b> <code>${e.key}</code>` +
    `</div>`;

  document.getElementById('key-display').textContent = e.key;
  document.getElementById('new-bib').value = '';
  document.getElementById('diff-view').style.display = 'none';
  document.getElementById('progress-text').textContent = `${idx + 1} / ${entries.length}`;
  updateStats();
}

function highlightInBib(entry) {
  const ta = document.getElementById('bib-textarea');
  const text = ta.value;
  const re = new RegExp('@\\w+\\s*\\{\\s*' + escapeRe(entry.key) + '\\s*,', 'i');
  const m = re.exec(text);
  if (!m) return;
  let depth = 0, i = m.index;
  for (; i < text.length; i++) {
    if (text[i] === '{') depth++;
    else if (text[i] === '}') { depth--; if (depth === 0) { i++; break; } }
  }
  ta.focus();
  ta.setSelectionRange(m.index, i);
  const lines = text.slice(0, m.index).split('\n').length;
  const lineH = parseFloat(getComputedStyle(ta).lineHeight) || 17;
  ta.scrollTop = Math.max(0, (lines - 3) * lineH);
}

// ── Undo ──────────────────────────────────────────────────────────
function pushHistory() {
  undoHistory.push({
    text: document.getElementById('bib-textarea').value,
    statuses: entries.map(e => ({ key: e.key, status: e.status })),
    idx: currentIdx,
  });
  if (undoHistory.length > 30) undoHistory.shift();
  updateUndoBtn();
}

function undoState() {
  if (!undoHistory.length) { showToast(t('toast-no-undo')); return; }
  const s = undoHistory.pop();
  document.getElementById('bib-textarea').value = s.text;
  reparsePreservingStatus();
  s.statuses.forEach(({ key, status }) => {
    const e = entries.find(x => x.key === key);
    if (e) e.status = status;
  });
  renderEntryList();
  selectEntry(s.idx >= 0 && s.idx < entries.length ? s.idx : currentIdx);
  updateUndoBtn();
  showToast(t('toast-undo'));
}

function updateUndoBtn() {
  const btn = document.getElementById('undo-btn');
  if (!btn) return;
  btn.disabled = undoHistory.length === 0;
  btn.textContent = t('btn-undo') + (undoHistory.length > 0 ? ` (${undoHistory.length})` : '');
}

// ── Diff view ─────────────────────────────────────────────────────
function updateDiffView() {
  const diffEl = document.getElementById('diff-view');
  const newBibText = document.getElementById('new-bib').value.trim();
  if (!newBibText || currentIdx < 0) { diffEl.style.display = 'none'; return; }

  const oldEntry = entries[currentIdx];
  const oldFields = extractFields(oldEntry.raw);
  const oldType = oldEntry.type;

  // Parse new bib (wrap if user pasted only fields without @type{key,...})
  let text = newBibText;
  if (!text.startsWith('@')) text = `@misc{__tmp__,\n${text}\n}`;
  const parsed = parseBib(text);
  if (!parsed.length) { diffEl.style.display = 'none'; return; }
  const newE = parsed[0];
  const newFields = extractFields(newE.raw);
  const newType = newE.type;

  const rows = [];

  // Type comparison
  if (oldType !== newType) {
    rows.push({ field: 'type', old: `@${oldType}`, new: `@${newType}`, status: 'changed' });
  }

  // Field comparison
  const allFields = new Set([...Object.keys(oldFields), ...Object.keys(newFields)]);
  allFields.delete('');
  // Prioritized display order
  const priority = ['title','author','year','booktitle','journal','volume','pages','publisher','doi','url','note'];
  const sorted = [...priority.filter(f => allFields.has(f)), ...[...allFields].filter(f => !priority.includes(f))];

  for (const f of sorted) {
    if (['key'].includes(f)) continue;
    const ov = cleanStr(oldFields[f] || '');
    const nv = cleanStr(newFields[f] || '');
    if (!ov && !nv) continue;
    if (ov === nv) continue;
    rows.push({
      field: f,
      old: ov || '',
      new: nv || '',
      status: !ov ? 'added' : !nv ? 'removed' : 'changed',
    });
  }

  if (!rows.length) {
    diffEl.innerHTML = `<div class="diff-same-msg">${t('diff-same')}</div>`;
    diffEl.style.display = 'block';
    return;
  }

  const trunc = s => s.length > 90 ? s.slice(0, 90) + '…' : s;
  let html = `<div class="diff-title">${t('diff-title')}</div><table class="diff-table">`;
  for (const r of rows) {
    html += `<tr class="diff-${r.status}">
      <td class="diff-field">${r.field}</td>
      <td class="diff-old">${r.status !== 'added'   ? trunc(r.old) : '<span style="color:#9ca3af">—</span>'}</td>
      <td class="diff-arrow">→</td>
      <td class="diff-new">${r.status !== 'removed' ? trunc(r.new) : '<span style="color:#9ca3af">—</span>'}</td>
    </tr>`;
  }
  html += '</table>';
  diffEl.innerHTML = html;
  diffEl.style.display = 'block';
}

// ── Search side panel (画中画 launcher) ───────────────────────────
let currentSearchTab = 'scholar';
let _sideWindow = null;

function getSearchUrl(service) {
  if (currentIdx < 0) return '';
  const q = encodeURIComponent(entries[currentIdx].title);
  return service === 'scholar'
    ? `https://scholar.google.com/scholar?q=${q}`
    : `https://www.semanticscholar.org/search?q=${q}&sort=Relevance`;
}

function openSearch(service) {
  if (currentIdx < 0) return;
  currentSearchTab = service;
  updateSearchPanel(service);
  document.getElementById('search-panel').classList.add('open');
  document.getElementById('sp-overlay').classList.add('show');
}

function switchTab(service) {
  currentSearchTab = service;
  updateSearchPanel(service);
}

function updateSearchPanel(service) {
  const url = getSearchUrl(service);
  const e = entries[currentIdx];

  // Tabs
  document.getElementById('sp-tab-scholar').classList.toggle('active',  service === 'scholar');
  document.getElementById('sp-tab-semantic').classList.toggle('active', service === 'semantic');

  // Paper title
  document.getElementById('sp-paper-title').textContent = e ? e.title : '';

  // Primary action button
  document.getElementById('sp-side-scholar-btn').style.display  = service === 'scholar'  ? '' : 'none';
  document.getElementById('sp-side-semantic-btn').style.display = service === 'semantic' ? '' : 'none';

  // URL bar
  document.getElementById('sp-url-display').textContent = url;

  // Steps
  const steps = t('sp-steps-' + service);
  const stepsHtml = steps.map((s, i) =>
    `<div class="sp-step"><div class="sp-step-num">${i+1}</div><div>${s}</div></div>`
  ).join('');
  document.getElementById('sp-steps').innerHTML = stepsHtml;
}

function openSideWindow(service) {
  const url = getSearchUrl(service);
  if (!url) return;
  const w = 700;
  const h = screen.availHeight;
  const left = screen.availLeft + Math.max(0, screen.availWidth - w);
  const top  = screen.availTop;
  // Reuse same window if it's still open
  if (_sideWindow && !_sideWindow.closed) {
    _sideWindow.location.href = url;
    _sideWindow.focus();
  } else {
    _sideWindow = window.open(
      url, 'bib_search_panel',
      `width=${w},height=${h},left=${left},top=${top},resizable=yes,scrollbars=yes,toolbar=yes`
    );
  }
}

function copySearchUrl() {
  const url = getSearchUrl(currentSearchTab);
  if (!url) return;
  navigator.clipboard.writeText(url).then(() => showToast(t('toast-copied-url')));
}

function closeSearchPanel() {
  document.getElementById('search-panel').classList.remove('open');
  document.getElementById('sp-overlay').classList.remove('show');
}

// ── Actions ───────────────────────────────────────────────────────
function replaceEntry() {
  if (currentIdx < 0) return;
  let newBib = document.getElementById('new-bib').value.trim();
  if (!newBib) { showToast(t('toast-no-new-bib')); return; }
  const e = entries[currentIdx];
  if (document.getElementById('keep-key').checked) {
    newBib = newBib.replace(/^(@\w+\s*\{\s*)[\w:._\-]+/, `$1${e.key}`);
  }
  const ta = document.getElementById('bib-textarea');
  const text = ta.value;
  const re = new RegExp('@\\w+\\s*\\{\\s*' + escapeRe(e.key) + '\\s*,', 'i');
  const m = re.exec(text);
  if (!m) { showToast(t('toast-not-found', e.key)); return; }
  pushHistory();
  let depth = 0, i = m.index;
  for (; i < text.length; i++) {
    if (text[i] === '{') depth++;
    else if (text[i] === '}') { depth--; if (depth === 0) { i++; break; } }
  }
  ta.value = text.slice(0, m.index) + newBib + text.slice(i);
  reparsePreservingStatus();
  const newIdx = entries.findIndex(x => x.key === e.key);
  if (newIdx !== -1) { entries[newIdx].status = 'replaced'; currentIdx = newIdx; }
  renderEntryList();
  showToast(t('toast-replaced'));
  setTimeout(() => {
    const ni = findNextPending(newIdx !== -1 ? newIdx : currentIdx);
    selectEntry(ni !== -1 ? ni : currentIdx);
  }, 350);
}

function keepOriginal() {
  if (currentIdx < 0) return;
  pushHistory();
  entries[currentIdx].status = 'ok';
  renderEntryList();
  const next = findNextPending(currentIdx);
  selectEntry(next !== -1 ? next : currentIdx);
}

function findNextPending(from) {
  for (let i = from + 1; i < entries.length; i++) {
    if (entries[i].status === 'pending') return i;
  }
  for (let i = 0; i <= from; i++) {
    if (entries[i].status === 'pending') return i;
  }
  return -1;
}

function navigate(dir) {
  const next = currentIdx + dir;
  if (next >= 0 && next < entries.length) selectEntry(next);
}

function updateStats() {
  if (entries.length === 0) { document.getElementById('stats').innerHTML = ''; return; }
  const pending  = entries.filter(e => e.status === 'pending').length;
  const ok       = entries.filter(e => e.status === 'ok').length;
  const replaced = entries.filter(e => e.status === 'replaced').length;
  document.getElementById('stats').innerHTML =
    `<span>${t('stats-pending', pending)}</span>` +
    `<span>${t('stats-ok', ok)}</span>` +
    `<span>${t('stats-replaced', replaced)}</span>`;
}

function downloadBib() {
  const text = document.getElementById('bib-textarea').value;
  if (!text.trim()) { showToast(t('toast-nothing')); return; }
  const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'main.bib';
  a.click();
  showToast(t('toast-downloading'));
}

function escapeRe(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._timer);
  el._timer = setTimeout(() => el.classList.remove('show'), 2200);
}

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;
  if (e.key === 'Escape') { closeSearchPanel(); return; }
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); navigate(1); }
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   { e.preventDefault(); navigate(-1); }
  if ((e.ctrlKey || e.metaKey) && e.key === 'z') { e.preventDefault(); undoState(); }
});

// Init
applyLang();
</script>
