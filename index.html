<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BibTeX Reference Checker</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #f0f2f5;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  color: #1f2937;
}

/* ── Header ─────────────────────────────────────────────── */
header {
  background: linear-gradient(135deg, #1e40af, #3b82f6);
  color: white;
  padding: 10px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
}
header h1 { font-size: 1rem; font-weight: 700; letter-spacing: 0.01em; }
.header-right { display: flex; align-items: center; gap: 12px; }
#stats { display: flex; gap: 6px; font-size: 12px; }
#stats span {
  background: rgba(255,255,255,0.18);
  border-radius: 20px;
  padding: 2px 10px;
  font-weight: 500;
}
.btn-download {
  background: white;
  color: #1e40af;
  border: none;
  border-radius: 6px;
  padding: 6px 14px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.15s;
}
.btn-download:hover { background: #eff6ff; }

/* ── Main layout ─────────────────────────────────────────── */
.main {
  display: flex;
  flex: 1;
  gap: 10px;
  padding: 10px;
  overflow: hidden;
}

/* ── Left panel ──────────────────────────────────────────── */
.left-panel {
  display: flex;
  flex-direction: column;
  width: 42%;
  gap: 7px;
  flex-shrink: 0;
}
.panel-toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.panel-toolbar label { font-size: 13px; font-weight: 600; color: #374151; }
.btn-parse {
  background: #1e40af;
  color: white;
  border: none;
  border-radius: 5px;
  padding: 5px 13px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.15s;
}
.btn-parse:hover { background: #1d4ed8; }

#bib-textarea {
  flex: 1;
  font-family: 'Courier New', Courier, monospace;
  font-size: 11.5px;
  line-height: 1.55;
  border: 1px solid #d1d5db;
  border-radius: 7px;
  padding: 10px;
  resize: none;
  outline: none;
  background: #fff;
  color: #111827;
  transition: border-color 0.15s, box-shadow 0.15s;
}
#bib-textarea:focus {
  border-color: #3b82f6;
  box-shadow: 0 0 0 3px rgba(59,130,246,0.12);
}

/* ── Right panel ─────────────────────────────────────────── */
.right-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 8px;
  overflow: hidden;
  min-width: 0;
}

/* Entry list */
.entry-list-wrap {
  background: white;
  border: 1px solid #d1d5db;
  border-radius: 7px;
  overflow-y: auto;
  max-height: 195px;
  flex-shrink: 0;
}
.entry-placeholder {
  color: #9ca3af;
  font-size: 13px;
  text-align: center;
  padding: 18px;
  font-style: italic;
}
.entry-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 12px;
  border-bottom: 1px solid #f3f4f6;
  cursor: pointer;
  transition: background 0.1s;
}
.entry-item:last-child { border-bottom: none; }
.entry-item:hover { background: #f9fafb; }
.entry-item.active {
  background: #eff6ff;
  border-left: 3px solid #3b82f6;
  padding-left: 9px;
}
.entry-badge { font-size: 14px; flex-shrink: 0; width: 18px; text-align: center; }
.entry-key {
  font-family: monospace;
  font-size: 11px;
  color: #6b7280;
  flex-shrink: 0;
  width: 140px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.entry-title-small {
  font-size: 12px;
  color: #374151;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* Checker panel */
.checker-panel {
  background: white;
  border: 1px solid #d1d5db;
  border-radius: 7px;
  padding: 14px;
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 10px;
  overflow-y: auto;
}
.checker-placeholder {
  color: #9ca3af;
  font-size: 13px;
  text-align: center;
  padding: 30px 0;
  font-style: italic;
}

.entry-info {
  background: #f8fafc;
  border: 1px solid #e2e8f0;
  border-radius: 6px;
  padding: 10px 12px;
  font-size: 12.5px;
  line-height: 1.65;
}
.entry-info .info-title {
  font-weight: 700;
  color: #111827;
  margin-bottom: 5px;
  font-size: 13px;
}
.entry-info .info-row { color: #4b5563; }
.entry-info code {
  background: #e5e7eb;
  border-radius: 3px;
  padding: 1px 5px;
  font-size: 11px;
  color: #374151;
}

.btn-row { display: flex; gap: 8px; }
.btn {
  flex: 1;
  padding: 8px 10px;
  border: none;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.15s, transform 0.1s;
}
.btn:hover { opacity: 0.88; }
.btn:active { transform: scale(0.97); }
.btn-scholar  { background: #4285f4; color: white; }
.btn-semantic { background: #7c3aed; color: white; }
.btn-replace  { background: #059669; color: white; }
.btn-keep     { background: #e5e7eb; color: #374151; }
.btn-nav      { background: #f3f4f6; color: #374151; font-size: 12px; padding: 6px 10px; }

.field-label { font-size: 12px; font-weight: 600; color: #374151; display: block; margin-bottom: 4px; }

#new-bib {
  width: 100%;
  font-family: 'Courier New', Courier, monospace;
  font-size: 11.5px;
  line-height: 1.5;
  border: 1px solid #d1d5db;
  border-radius: 6px;
  padding: 8px 10px;
  resize: vertical;
  outline: none;
  transition: border-color 0.15s;
  min-height: 130px;
  background: #fafafa;
}
#new-bib:focus {
  border-color: #3b82f6;
  background: white;
  box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
}

.keep-key-row {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: #6b7280;
}
.keep-key-row input[type=checkbox] { cursor: pointer; }
.keep-key-row code {
  background: #e5e7eb;
  border-radius: 3px;
  padding: 1px 5px;
  font-size: 11px;
  color: #374151;
}

.nav-row {
  display: flex;
  align-items: center;
  gap: 8px;
}
#progress-text {
  flex: 1;
  text-align: center;
  font-size: 12px;
  color: #9ca3af;
  font-weight: 500;
}

.toast {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #1e293b;
  color: white;
  padding: 9px 16px;
  border-radius: 8px;
  font-size: 13px;
  opacity: 0;
  transform: translateY(8px);
  transition: all 0.2s;
  pointer-events: none;
  z-index: 999;
}
.toast.show { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<header>
  <h1>📚 BibTeX Reference Checker</h1>
  <div class="header-right">
    <div id="stats"></div>
    <button class="btn-download" onclick="downloadBib()">⬇ Download .bib</button>
  </div>
</header>

<div class="main">

  <!-- LEFT: bib editor -->
  <div class="left-panel">
    <div class="panel-toolbar">
      <label>BibTeX Source</label>
      <button class="btn-parse" onclick="parseAndRender()">Parse Entries →</button>
    </div>
    <textarea id="bib-textarea" spellcheck="false"
      placeholder="Paste your .bib file content here, then click 'Parse Entries' →"></textarea>
  </div>

  <!-- RIGHT: navigator + checker -->
  <div class="right-panel">

    <!-- Entry list -->
    <div class="entry-list-wrap" id="entry-list-wrap">
      <div class="entry-placeholder">Parse entries to begin</div>
    </div>

    <!-- Checker -->
    <div class="checker-panel" id="checker-panel">
      <div class="checker-placeholder" id="checker-placeholder">
        Select an entry from the list above to check it
      </div>

      <div id="active-checker" style="display:none; flex-direction:column; gap:10px; flex:1;">

        <div class="entry-info" id="entry-info"></div>

        <div class="btn-row">
          <button class="btn btn-scholar" onclick="openScholar()">🔍 Google Scholar</button>
          <button class="btn btn-semantic" onclick="openSemantic()">📖 Semantic Scholar</button>
        </div>

        <div>
          <label class="field-label" for="new-bib">Paste new BibTeX (Scholar → Cite → BibTeX):</label>
          <textarea id="new-bib" rows="7"
            placeholder="@inproceedings{key,&#10;  title={...},&#10;  author={...},&#10;  year={...},&#10;  booktitle={...}&#10;}"></textarea>
        </div>

        <div class="keep-key-row">
          <input type="checkbox" id="keep-key" checked>
          <label for="keep-key">Keep original key: <code id="key-display"></code></label>
        </div>

        <div class="btn-row">
          <button class="btn btn-replace" onclick="replaceEntry()">✅ Replace Entry</button>
          <button class="btn btn-keep" onclick="keepOriginal()">👍 Keep Original</button>
        </div>

        <div class="nav-row">
          <button class="btn btn-nav" onclick="navigate(-1)">← Prev</button>
          <span id="progress-text">0 / 0</span>
          <button class="btn btn-nav" onclick="navigate(1)">Next →</button>
        </div>

      </div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ──────────────────────────────────────────────────────────────────
// State
// ──────────────────────────────────────────────────────────────────
let entries = [];
let currentIdx = -1;

// ──────────────────────────────────────────────────────────────────
// BibTeX parser  (brace-depth scanner)
// ──────────────────────────────────────────────────────────────────
function parseBib(text) {
  const results = [];
  let i = 0;

  while (i < text.length) {
    // Find next @
    const at = text.indexOf('@', i);
    if (at === -1) break;

    // Read entry type
    let j = at + 1;
    while (j < text.length && /\w/.test(text[j])) j++;
    const type = text.slice(at + 1, j).trim().toLowerCase();

    // Skip @string, @preamble, @comment
    if (!type || type === 'string' || type === 'preamble' || type === 'comment') {
      // find and skip matching braces/parens
      const ob = text.indexOf('{', j);
      if (ob === -1) break;
      let d = 0, k = ob;
      for (; k < text.length; k++) {
        if (text[k] === '{') d++;
        else if (text[k] === '}') { d--; if (d === 0) { k++; break; } }
      }
      i = k;
      continue;
    }

    // Find opening brace
    const ob = text.indexOf('{', j);
    if (ob === -1) break;

    // Find matching closing brace (skip quoted strings)
    let depth = 0, k = ob, inQuote = false;
    for (; k < text.length; k++) {
      const ch = text[k];
      if (ch === '"' && depth === 1) inQuote = !inQuote;
      if (!inQuote) {
        if (ch === '{') depth++;
        else if (ch === '}') { depth--; if (depth === 0) { k++; break; } }
      }
    }

    const raw = text.slice(at, k);

    // Extract key
    const comma = raw.indexOf(',');
    if (comma === -1) { i = k; continue; }
    const key = raw.slice(raw.indexOf('{') + 1, comma).trim();
    if (!key || /\s/.test(key)) { i = k; continue; }

    // Extract fields
    const f = extractFields(raw);

    results.push({
      key,
      type,
      raw,
      start: at,
      end: k,
      title:   cleanStr(f.title   || '(no title)'),
      authors: cleanStr(f.author  || ''),
      year:    (f.year || '').replace(/[{}]/g, '').trim(),
      venue:   cleanStr(f.journal || f.booktitle || f.howpublished || ''),
      url:     cleanStr(f.url     || f.doi || ''),
      status: 'pending',
    });

    i = k;
  }
  return results;
}

function extractFields(raw) {
  const fields = {};
  // Find each "fieldname = value" pair
  const re = /\b([a-zA-Z]\w*)\s*=\s*/g;
  let m;
  while ((m = re.exec(raw)) !== null) {
    const name = m[1].toLowerCase();
    if (name === raw.slice(raw.indexOf('{') + 1, raw.indexOf(',')).trim().toLowerCase()) continue;
    const pos = m.index + m[0].length;
    const ch = raw[pos];
    let val = '';
    if (ch === '{') {
      // find matching }
      let d = 0, j = pos;
      for (; j < raw.length; j++) {
        if (raw[j] === '{') d++;
        else if (raw[j] === '}') { d--; if (d === 0) { j++; break; } }
      }
      val = raw.slice(pos + 1, j - 1);
    } else if (ch === '"') {
      const end = raw.indexOf('"', pos + 1);
      val = end === -1 ? '' : raw.slice(pos + 1, end);
    } else {
      // bare number or word until , or }
      const end = raw.slice(pos).search(/[,}\s]/);
      val = end === -1 ? raw.slice(pos) : raw.slice(pos, pos + end);
    }
    fields[name] = val;
  }
  return fields;
}

function cleanStr(s) {
  if (!s) return '';
  return s.replace(/\{\\['"` ^~cduHkrtvb]\s*\{?([a-zA-Z])\}?\}/g, '$1')  // LaTeX accents
          .replace(/\\[a-zA-Z]+\s*/g, '')
          .replace(/[{}\\"]/g, '')
          .replace(/\s+/g, ' ')
          .trim();
}

// ──────────────────────────────────────────────────────────────────
// Status preservation after re-parse
// ──────────────────────────────────────────────────────────────────
function reparsePreservingStatus() {
  const statusMap = {};
  entries.forEach(e => { statusMap[e.key] = e.status; });
  entries = parseBib(document.getElementById('bib-textarea').value);
  entries.forEach(e => { if (statusMap[e.key]) e.status = statusMap[e.key]; });
}

// ──────────────────────────────────────────────────────────────────
// Parse & render
// ──────────────────────────────────────────────────────────────────
function parseAndRender() {
  const text = document.getElementById('bib-textarea').value;
  if (!text.trim()) { showToast('Paste your .bib content first'); return; }
  entries = parseBib(text);
  if (entries.length === 0) { showToast('No entries found — check your BibTeX format'); return; }
  renderEntryList();
  selectEntry(0);
  showToast(`Parsed ${entries.length} entries`);
}

function renderEntryList() {
  const wrap = document.getElementById('entry-list-wrap');
  wrap.innerHTML = '';
  entries.forEach((e, i) => {
    const div = document.createElement('div');
    div.className = 'entry-item' + (i === currentIdx ? ' active' : '');
    div.dataset.idx = i;
    div.onclick = () => selectEntry(i);
    const badge = e.status === 'ok' ? '✅' : e.status === 'replaced' ? '🔄' : '⏳';
    div.innerHTML =
      `<span class="entry-badge">${badge}</span>` +
      `<span class="entry-key" title="${e.key}">${e.key}</span>` +
      `<span class="entry-title-small" title="${e.title}">${e.title}</span>`;
    wrap.appendChild(div);
  });
  updateStats();
}

// ──────────────────────────────────────────────────────────────────
// Select & display entry
// ──────────────────────────────────────────────────────────────────
function selectEntry(idx) {
  if (idx < 0 || idx >= entries.length) return;
  currentIdx = idx;
  const e = entries[idx];

  // Update list highlight
  document.querySelectorAll('.entry-item').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
    if (i === idx) el.scrollIntoView({ block: 'nearest' });
  });

  // Highlight in bib textarea
  highlightInBib(e);

  // Show checker
  document.getElementById('checker-placeholder').style.display = 'none';
  const ac = document.getElementById('active-checker');
  ac.style.display = 'flex';

  // Fill entry info
  const authShort = e.authors.length > 100 ? e.authors.slice(0, 100) + '…' : e.authors;
  document.getElementById('entry-info').innerHTML =
    `<div class="info-title">${e.title || '(no title)'}</div>` +
    `<div class="info-row">` +
    (e.authors ? `<b>Authors:</b> ${authShort}<br>` : '') +
    (e.year    ? `<b>Year:</b> ${e.year}` : '') +
    (e.year && e.venue ? ' &nbsp;·&nbsp; ' : '') +
    (e.venue   ? `<b>Venue:</b> ${e.venue.slice(0, 80)}` : '') +
    `<br><b>Type:</b> @${e.type} &nbsp; <b>Key:</b> <code>${e.key}</code>` +
    `</div>`;

  document.getElementById('key-display').textContent = e.key;
  document.getElementById('new-bib').value = '';
  document.getElementById('progress-text').textContent = `${idx + 1} / ${entries.length}`;

  updateStats();
}

function highlightInBib(entry) {
  const ta = document.getElementById('bib-textarea');
  const text = ta.value;

  // Re-find position by key (in case text was edited)
  const re = new RegExp('@\\w+\\s*\\{\\s*' + escapeRe(entry.key) + '\\s*,', 'i');
  const m = re.exec(text);
  if (!m) return;

  let depth = 0, i = m.index;
  for (; i < text.length; i++) {
    if (text[i] === '{') depth++;
    else if (text[i] === '}') { depth--; if (depth === 0) { i++; break; } }
  }

  ta.focus();
  ta.setSelectionRange(m.index, i);

  // Scroll to selection
  const lines = text.slice(0, m.index).split('\n').length;
  const lineH = parseFloat(getComputedStyle(ta).lineHeight) || 17;
  ta.scrollTop = Math.max(0, (lines - 3) * lineH);
}

// ──────────────────────────────────────────────────────────────────
// Scholar buttons
// ──────────────────────────────────────────────────────────────────
function openScholar() {
  if (currentIdx < 0) return;
  const q = encodeURIComponent(entries[currentIdx].title);
  window.open(`https://scholar.google.com/scholar?q=${q}`, '_blank');
}

function openSemantic() {
  if (currentIdx < 0) return;
  const q = encodeURIComponent(entries[currentIdx].title);
  window.open(`https://www.semanticscholar.org/search?q=${q}&sort=Relevance`, '_blank');
}

// ──────────────────────────────────────────────────────────────────
// Replace entry
// ──────────────────────────────────────────────────────────────────
function replaceEntry() {
  if (currentIdx < 0) return;
  let newBib = document.getElementById('new-bib').value.trim();
  if (!newBib) { showToast('Paste the new BibTeX first'); return; }

  const e = entries[currentIdx];

  // Keep original key if checkbox checked
  if (document.getElementById('keep-key').checked) {
    newBib = newBib.replace(/^(@\w+\s*\{\s*)[\w:._\-]+/, `$1${e.key}`);
  }

  // Find entry in text and replace
  const ta = document.getElementById('bib-textarea');
  const text = ta.value;
  const re = new RegExp('@\\w+\\s*\\{\\s*' + escapeRe(e.key) + '\\s*,', 'i');
  const m = re.exec(text);
  if (!m) { showToast(`Could not find @${e.key}`); return; }

  let depth = 0, i = m.index;
  for (; i < text.length; i++) {
    if (text[i] === '{') depth++;
    else if (text[i] === '}') { depth--; if (depth === 0) { i++; break; } }
  }

  ta.value = text.slice(0, m.index) + newBib + text.slice(i);

  // Re-parse preserving statuses
  reparsePreservingStatus();
  entries[currentIdx] = entries.find(x => x.key === e.key) || entries[currentIdx];
  const newIdx = entries.findIndex(x => x.key === e.key);
  if (newIdx !== -1) entries[newIdx].status = 'replaced';

  renderEntryList();
  showToast('✅ Entry replaced');
  setTimeout(() => {
    const ni = findNextPending(newIdx !== -1 ? newIdx : currentIdx);
    selectEntry(ni !== -1 ? ni : currentIdx);
  }, 350);
}

function keepOriginal() {
  if (currentIdx < 0) return;
  entries[currentIdx].status = 'ok';
  renderEntryList();
  const next = findNextPending(currentIdx);
  selectEntry(next !== -1 ? next : currentIdx);
}

function findNextPending(from) {
  for (let i = from + 1; i < entries.length; i++) {
    if (entries[i].status === 'pending') return i;
  }
  // wrap around
  for (let i = 0; i <= from; i++) {
    if (entries[i].status === 'pending') return i;
  }
  return -1;
}

function navigate(dir) {
  const next = currentIdx + dir;
  if (next >= 0 && next < entries.length) selectEntry(next);
}

// ──────────────────────────────────────────────────────────────────
// Stats & download
// ──────────────────────────────────────────────────────────────────
function updateStats() {
  if (entries.length === 0) { document.getElementById('stats').innerHTML = ''; return; }
  const pending  = entries.filter(e => e.status === 'pending').length;
  const ok       = entries.filter(e => e.status === 'ok').length;
  const replaced = entries.filter(e => e.status === 'replaced').length;
  document.getElementById('stats').innerHTML =
    `<span>⏳ ${pending} pending</span>` +
    `<span>✅ ${ok} ok</span>` +
    `<span>🔄 ${replaced} replaced</span>`;
}

function downloadBib() {
  const text = document.getElementById('bib-textarea').value;
  if (!text.trim()) { showToast('Nothing to download'); return; }
  const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'main.bib';
  a.click();
  showToast('Downloading main.bib');
}

// ──────────────────────────────────────────────────────────────────
// Utilities
// ──────────────────────────────────────────────────────────────────
function escapeRe(s) {
  return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2200);
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); navigate(1); }
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   { e.preventDefault(); navigate(-1); }
  if (e.key === 'Enter' && e.metaKey) replaceEntry();
  if (e.key === 'k' && e.metaKey) keepOriginal();
});
</script>
</body>
</html>
