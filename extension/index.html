<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📚 BibTeX Checker</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='26' font-size='28'>📚</text></svg>">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #0f172a;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  color: #f1f5f9;
  font-size: 13px;
}

/* ── Header ─────────────────────────────────────────────────── */
header {
  background: #1e293b;
  border-bottom: 1px solid #334155;
  padding: 8px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
  height: 42px;
}
.header-title { font-size: 14px; font-weight: 700; color: #f8fafc; letter-spacing: -.01em; }
.header-stats { display: flex; gap: 5px; margin-left: 6px; }
.stat-chip {
  border-radius: 20px; padding: 2px 9px; font-size: 11px; font-weight: 700;
  background: rgba(255,255,255,.05);
}
.stat-chip.pending  { color: #fbbf24; }
.stat-chip.ok       { color: #34d399; }
.stat-chip.replaced { color: #60a5fa; }
.hr { margin-left: auto; display: flex; gap: 6px; }
.btn-hdr {
  background: transparent; color: #64748b; border: 1px solid #334155;
  border-radius: 5px; padding: 4px 10px; font-size: 11px; font-weight: 600; cursor: pointer;
  transition: all .15s;
}
.btn-hdr:hover { background: #334155; color: #94a3b8; }
.btn-hdr:disabled { opacity: .3; cursor: not-allowed; }

/* ── Layout ─────────────────────────────────────────────────── */
.main { display: flex; flex: 1; overflow: hidden; }

/* ── Left: BibTeX input ──────────────────────────────────────── */
.left {
  width: 38%; display: flex; flex-direction: column;
  border-right: 1px solid #1e293b;
  flex-shrink: 0;
}
.panel-hdr {
  padding: 7px 11px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid #1e293b;
  flex-shrink: 0;
}
.panel-lbl { font-size: 10px; font-weight: 700; color: #475569; text-transform: uppercase; letter-spacing: .07em; }
.btn-parse {
  background: #3b82f6; color: white; border: none; border-radius: 5px;
  padding: 4px 10px; font-size: 11px; font-weight: 700; cursor: pointer;
}
.btn-parse:hover { background: #2563eb; }

#bib-textarea {
  flex: 1; resize: none; outline: none; border: none;
  font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
  font-size: 10.5px; line-height: 1.65;
  background: #080e1a; color: #64748b;
  padding: 10px 12px;
}
#bib-textarea::placeholder { color: #1e293b; }

/* ── Right: workflow ─────────────────────────────────────────── */
.right { flex: 1; display: flex; flex-direction: column; min-width: 0; overflow: hidden; }

/* entry list */
.entry-list-wrap {
  border-bottom: 1px solid #1e293b;
  max-height: 190px; overflow-y: auto; flex-shrink: 0;
}
.entry-list-wrap::-webkit-scrollbar { width: 4px; }
.entry-list-wrap::-webkit-scrollbar-track { background: transparent; }
.entry-list-wrap::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }

.list-empty { padding: 14px; text-align: center; font-size: 12px; color: #334155; font-style: italic; }

.entry-row {
  display: flex; align-items: center; gap: 8px;
  padding: 5px 11px; cursor: pointer;
  border-bottom: 1px solid rgba(255,255,255,.025);
  transition: background .1s;
}
.entry-row:hover { background: #1a2744; }
.entry-row.active { background: #172554; border-left: 2px solid #3b82f6; padding-left: 9px; }
.entry-badge { font-size: 12px; flex-shrink: 0; cursor: pointer; transition: transform .1s; }
.entry-badge:hover { transform: scale(1.3); }
.entry-key { font-family: monospace; font-size: 10px; color: #374151; width: 120px; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.entry-ttl { font-size: 11.5px; color: #64748b; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.entry-row.active .entry-key { color: #60a5fa; }
.entry-row.active .entry-ttl { color: #94a3b8; }

/* workflow scroll area */
.workflow-scroll {
  flex: 1; overflow-y: auto; padding: 12px;
  display: flex; flex-direction: column; gap: 10px;
}
.workflow-scroll::-webkit-scrollbar { width: 4px; }
.workflow-scroll::-webkit-scrollbar-track { background: transparent; }
.workflow-scroll::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 2px; }

.no-entry-msg { flex: 1; display: flex; align-items: center; justify-content: center; color: #1e293b; font-style: italic; }

#active-workflow { display: none; flex-direction: column; gap: 10px; }

/* ── Entry card ──────────────────────────────────────────────── */
.entry-card {
  background: #1e293b; border-radius: 8px; padding: 11px 13px;
  border: 1px solid #334155;
}
.ec-title { font-size: 13px; font-weight: 600; color: #e2e8f0; line-height: 1.4; margin-bottom: 6px; }
.ec-meta  { font-size: 11px; color: #475569; line-height: 1.7; }
.ec-meta code { background: #0f172a; border-radius: 3px; padding: 1px 5px; font-size: 10px; color: #38bdf8; }

/* ── Pipeline card ──────────────────────────────────────────── */
.pipeline-card {
  background: #1e293b; border-radius: 8px; padding: 13px;
  border: 1px solid #334155;
}
.pc-top {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px;
}
.pc-label { font-size: 10px; font-weight: 700; color: #475569; text-transform: uppercase; letter-spacing: .07em; }
.delay-row { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #475569; }
.delay-row select {
  background: #0f172a; color: #64748b; border: 1px solid #334155;
  border-radius: 4px; padding: 2px 5px; font-size: 11px; cursor: pointer; outline: none;
}
.delay-row select:focus { border-color: #3b82f6; }

/* steps track */
.steps-track {
  position: relative;
  display: flex; align-items: flex-start;
  margin-bottom: 16px;
}
/* connector line behind dots */
.steps-track::before {
  content: '';
  position: absolute;
  top: 15px;
  left: 15px; right: 15px;
  height: 2px;
  background: #334155;
  z-index: 0;
}
.step {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  gap: 6px; position: relative; z-index: 1;
}
/* active connector fill */
.step.done + .step::before,
.step.done + .step.done::before {
  content: '';
  position: absolute;
  top: 15px; right: 50%; left: -50%;
  height: 2px; background: #10b981; z-index: -1;
}

.step-dot {
  width: 30px; height: 30px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  border: 2px solid #334155;
  background: #0f172a;
  transition: border-color .3s, background .3s, box-shadow .3s;
  font-size: 12px; font-weight: 700; color: #334155;
}
.step.active .step-dot {
  border-color: #3b82f6; background: #172554; color: #93c5fd;
  box-shadow: 0 0 0 4px rgba(59,130,246,.15);
  animation: pulse .9s ease-in-out infinite;
}
.step.done .step-dot {
  border-color: #10b981; background: #052e16; color: #10b981;
}
@keyframes pulse {
  0%,100% { box-shadow: 0 0 0 3px rgba(59,130,246,.2); }
  50%      { box-shadow: 0 0 0 7px rgba(59,130,246,.05); }
}
.step-icon { font-size: 13px; line-height: 1; }
.step-lbl {
  font-size: 9.5px; text-align: center; line-height: 1.35;
  color: #334155; white-space: nowrap;
  transition: color .3s;
}
.step.active .step-lbl { color: #60a5fa; }
.step.done   .step-lbl { color: #34d399; }

/* spinner inside active dot */
@keyframes spin { to { transform: rotate(360deg); } }
.step-spinner {
  width: 14px; height: 14px;
  border: 2px solid #3b82f6; border-top-color: transparent;
  border-radius: 50%; animation: spin .6s linear infinite;
}

/* start button */
.btn-start {
  width: 100%; padding: 11px;
  background: linear-gradient(135deg, #1d4ed8, #7c3aed);
  color: white; border: none; border-radius: 7px;
  font-size: 13px; font-weight: 700; cursor: pointer;
  letter-spacing: .02em;
  transition: opacity .15s, transform .1s;
}
.btn-start:hover { opacity: .88; }
.btn-start:active { transform: scale(.98); }
.btn-start:disabled { opacity: .35; cursor: not-allowed; }

/* status line */
.status-line {
  margin-top: 9px; min-height: 16px;
  font-size: 11.5px; color: #3b82f6;
  display: flex; align-items: center; gap: 6px;
}
.status-line.ok    { color: #34d399; }
.status-line.warn  { color: #fbbf24; }
.status-line.error { color: #f87171; }
@keyframes spin2 { to { transform: rotate(360deg); } }
.spinner {
  display: inline-block; width: 11px; height: 11px;
  border: 2px solid currentColor; border-top-color: transparent;
  border-radius: 50%; animation: spin2 .6s linear infinite;
  flex-shrink: 0;
}

/* ── Actions card ───────────────────────────────────────────── */
.actions-card {
  background: #1e293b; border-radius: 8px; padding: 11px 13px;
  border: 1px solid #334155;
  display: flex; flex-direction: column; gap: 8px;
}
.keep-key-row {
  display: flex; align-items: center; gap: 6px;
  font-size: 11px; color: #475569;
}
.keep-key-row input[type=checkbox] { accent-color: #3b82f6; cursor: pointer; }
.keep-key-row label { cursor: pointer; }
.keep-key-row code { background: #0f172a; border-radius: 3px; padding: 1px 5px; font-size: 10px; color: #38bdf8; }

.action-row { display: flex; gap: 7px; }
.btn-action {
  flex: 1; padding: 9px 8px; border: none; border-radius: 6px;
  font-size: 13px; font-weight: 700; cursor: pointer; transition: opacity .15s;
}
.btn-action:hover { opacity: .85; }
.btn-replace { background: #059669; color: white; }
.btn-keep    { background: #1e3a5f; color: #60a5fa; border: 1px solid #1e40af; }

.nav-row { display: flex; align-items: center; gap: 6px; }
.btn-nav {
  background: transparent; color: #475569; border: 1px solid #334155;
  border-radius: 5px; padding: 5px 10px; font-size: 11px; font-weight: 600; cursor: pointer;
}
.btn-nav:hover { background: #1e293b; color: #94a3b8; }
.prog-txt { flex: 1; text-align: center; font-size: 11px; color: #334155; font-weight: 700; }

/* ── Toast ──────────────────────────────────────────────────── */
.toast {
  position: fixed; bottom: 20px; left: 50%;
  transform: translateX(-50%) translateY(8px);
  background: #334155; color: #f1f5f9;
  padding: 7px 18px; border-radius: 8px; font-size: 12px;
  opacity: 0; transition: all .2s; pointer-events: none; z-index: 9999;
  white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <span class="header-title">📚 BibTeX Checker</span>
  <div class="header-stats" id="stats"></div>
  <div class="hr">
    <button class="btn-hdr" onclick="downloadBib()">⬇ 下载 .bib</button>
    <button class="btn-hdr" onclick="undoState()" id="undo-btn" disabled>↩ 撤销</button>
  </div>
</header>

<div class="main">

  <!-- ── Left: BibTeX source ── -->
  <div class="left">
    <div class="panel-hdr">
      <span class="panel-lbl">BibTeX 内容</span>
      <button class="btn-parse" onclick="parseAndRender()">解析条目 →</button>
    </div>
    <textarea id="bib-textarea" spellcheck="false"
      placeholder="粘贴 .bib 文件内容，自动解析…"
      onpaste="setTimeout(parseAndRender,30)"
      oninput="saveBib()"></textarea>
  </div>

  <!-- ── Right: workflow ── -->
  <div class="right">
    <!-- Entry list -->
    <div class="entry-list-wrap" id="entry-list-wrap">
      <div class="list-empty" id="list-empty">解析条目后开始核查</div>
    </div>

    <!-- Workflow area -->
    <div class="workflow-scroll">
      <div class="no-entry-msg" id="no-entry-msg">从上方列表选择一条参考文献</div>

      <div id="active-workflow">

        <!-- Entry card -->
        <div class="entry-card" id="entry-card"></div>

        <!-- Automation pipeline -->
        <div class="pipeline-card">
          <div class="pc-top">
            <span class="pc-label">自动化流程</span>
            <div class="delay-row">
              <span>间隔</span>
              <select id="delay-select" onchange="setFetchDelay(this.value)">
                <option value="1">1 s</option>
                <option value="2">2 s</option>
                <option value="3" selected>3 s</option>
                <option value="5">5 s</option>
                <option value="10">10 s</option>
              </select>
            </div>
          </div>

          <div class="steps-track">
            <div class="step idle" id="step-1">
              <div class="step-dot" id="dot-1">1</div>
              <div class="step-lbl">打开<br>Scholar</div>
            </div>
            <div class="step idle" id="step-2">
              <div class="step-dot" id="dot-2">2</div>
              <div class="step-lbl">点击<br>Cite</div>
            </div>
            <div class="step idle" id="step-3">
              <div class="step-dot" id="dot-3">3</div>
              <div class="step-lbl">点击<br>BibTeX</div>
            </div>
            <div class="step idle" id="step-4">
              <div class="step-dot" id="dot-4">4</div>
              <div class="step-lbl">获取<br>内容</div>
            </div>
            <div class="step idle" id="step-5">
              <div class="step-dot" id="dot-5">5</div>
              <div class="step-lbl">替换<br>条目</div>
            </div>
          </div>

          <button class="btn-start" id="autofetch-btn" onclick="autoFetchBib()">▶ 开始自动获取</button>
          <div class="status-line" id="fetch-status"></div>
        </div>

        <!-- Actions -->
        <div class="actions-card">
          <div class="keep-key-row">
            <input type="checkbox" id="keep-key" checked>
            <label for="keep-key">保留原始 key：</label>
            <code id="key-display"></code>
          </div>
          <div class="action-row">
            <button class="btn-action btn-replace" onclick="replaceEntry()">✅ 替换条目</button>
            <button class="btn-action btn-keep"    onclick="keepOriginal()">👍 保持不变</button>
          </div>
          <div class="nav-row">
            <button class="btn-nav" onclick="navigate(-1)">← 上一条</button>
            <span class="prog-txt" id="progress-text"></span>
            <button class="btn-nav" onclick="navigate(1)">下一条 →</button>
          </div>
        </div>

      </div><!-- /#active-workflow -->
    </div><!-- /.workflow-scroll -->
  </div><!-- /.right -->
</div><!-- /.main -->

<!-- Hidden: used internally by replaceEntry() -->
<textarea id="new-bib" style="display:none"></textarea>

<div class="toast" id="toast"></div>

<script>
// ── State ─────────────────────────────────────────────────────
let entries    = [];
let currentIdx = -1;
let undoHistory = [];

// ── Step management ───────────────────────────────────────────
// state: 'idle' | 'active' | 'done'
let stepState = ['', 'idle', 'idle', 'idle', 'idle', 'idle']; // 1-indexed

function setStep(n, state) {
  stepState[n] = state;
  const el  = document.getElementById('step-' + n);
  const dot = document.getElementById('dot-' + n);
  if (!el || !dot) return;
  el.className = 'step ' + state;
  if (state === 'active') {
    dot.innerHTML = '<div class="step-spinner"></div>';
  } else if (state === 'done') {
    dot.innerHTML = '✓';
  } else {
    dot.innerHTML = n;
  }
}

function resetSteps() {
  for (let i = 1; i <= 5; i++) setStep(i, 'idle');
}

// ── BibTeX parser ─────────────────────────────────────────────
function parseBib(text) {
  const results = [];
  let i = 0;
  while (i < text.length) {
    const at = text.indexOf('@', i);
    if (at === -1) break;
    let j = at + 1;
    while (j < text.length && /\w/.test(text[j])) j++;
    const type = text.slice(at + 1, j).trim().toLowerCase();
    if (!type || type === 'string' || type === 'preamble' || type === 'comment') {
      const ob = text.indexOf('{', j);
      if (ob === -1) break;
      let d = 0, k = ob;
      for (; k < text.length; k++) {
        if (text[k] === '{') d++;
        else if (text[k] === '}') { d--; if (d === 0) { k++; break; } }
      }
      i = k; continue;
    }
    const ob = text.indexOf('{', j);
    if (ob === -1) break;
    let depth = 0, k = ob, inQuote = false;
    for (; k < text.length; k++) {
      const ch = text[k];
      if (ch === '"' && depth === 1) inQuote = !inQuote;
      if (!inQuote) {
        if (ch === '{') depth++;
        else if (ch === '}') { depth--; if (depth === 0) { k++; break; } }
      }
    }
    const raw = text.slice(at, k);
    const comma = raw.indexOf(',');
    if (comma === -1) { i = k; continue; }
    const key = raw.slice(raw.indexOf('{') + 1, comma).trim();
    if (!key || /\s/.test(key)) { i = k; continue; }
    const f = extractFields(raw);
    results.push({
      key, type, raw, start: at, end: k,
      title:   cleanStr(f.title   || '(no title)'),
      authors: cleanStr(f.author  || ''),
      year:    (f.year || '').replace(/[{}]/g, '').trim(),
      venue:   cleanStr(f.journal || f.booktitle || f.howpublished || ''),
      status: 'pending',
    });
    i = k;
  }
  return results;
}

function extractFields(raw) {
  const fields = {};
  const re = /\b([a-zA-Z]\w*)\s*=\s*/g;
  let m;
  while ((m = re.exec(raw)) !== null) {
    const name = m[1].toLowerCase();
    const pos = m.index + m[0].length;
    const ch = raw[pos];
    let val = '';
    if (ch === '{') {
      let d = 0, j = pos;
      for (; j < raw.length; j++) {
        if (raw[j] === '{') d++;
        else if (raw[j] === '}') { d--; if (d === 0) { j++; break; } }
      }
      val = raw.slice(pos + 1, j - 1);
    } else if (ch === '"') {
      const end = raw.indexOf('"', pos + 1);
      val = end === -1 ? '' : raw.slice(pos + 1, end);
    } else {
      const end = raw.slice(pos).search(/[,}\s]/);
      val = end === -1 ? raw.slice(pos) : raw.slice(pos, pos + end);
    }
    fields[name] = val;
  }
  return fields;
}

function cleanStr(s) {
  if (!s) return '';
  return s.replace(/\{\\['"` ^~cduHkrtvb]\s*\{?([a-zA-Z])\}?\}/g, '$1')
          .replace(/\\[a-zA-Z]+\s*/g, '')
          .replace(/[{}\\"]/g, '')
          .replace(/\s+/g, ' ').trim();
}

// ── Parse & render ────────────────────────────────────────────
function reparsePreservingStatus() {
  const sm = {};
  entries.forEach(e => { sm[e.key] = e.status; });
  entries = parseBib(document.getElementById('bib-textarea').value);
  entries.forEach(e => { if (sm[e.key]) e.status = sm[e.key]; });
}

function parseAndRender() {
  const text = document.getElementById('bib-textarea').value;
  if (!text.trim()) { showToast('请先粘贴 .bib 内容'); return; }
  entries = parseBib(text);
  if (entries.length === 0) { showToast('未找到条目，请检查 BibTeX 格式'); return; }
  undoHistory = [];
  updateUndoBtn();
  renderEntryList();
  selectEntry(0);
  showToast(`已解析 ${entries.length} 条参考文献`);
}

function renderEntryList() {
  const wrap = document.getElementById('entry-list-wrap');
  const empty = document.getElementById('list-empty');
  // remove old rows
  wrap.querySelectorAll('.entry-row').forEach(r => r.remove());
  if (entries.length === 0) {
    if (empty) empty.style.display = '';
    return;
  }
  if (empty) empty.style.display = 'none';
  entries.forEach((e, i) => {
    const div = document.createElement('div');
    div.className = 'entry-row' + (i === currentIdx ? ' active' : '');
    div.dataset.idx = i;
    div.onclick = () => selectEntry(i);
    const badge = e.status === 'ok' ? '✅' : e.status === 'replaced' ? '🔄' : '⏳';
    div.innerHTML =
      `<span class="entry-badge" onclick="toggleStatus(${i},event)" title="点击切换状态">${badge}</span>` +
      `<span class="entry-key" title="${e.key}">${e.key}</span>` +
      `<span class="entry-ttl" title="${e.title}">${e.title}</span>`;
    wrap.appendChild(div);
  });
  updateStats();
}

// ── Toggle status ─────────────────────────────────────────────
function toggleStatus(idx, event) {
  event.stopPropagation();
  pushHistory();
  const e = entries[idx];
  if (e.status === 'pending') e.status = 'ok';
  else if (e.status === 'ok') e.status = 'pending';
  renderEntryList();
  updateStats();
}

// ── Select entry ──────────────────────────────────────────────
function selectEntry(idx) {
  if (idx < 0 || idx >= entries.length) return;
  currentIdx = idx;
  const e = entries[idx];

  document.querySelectorAll('.entry-row').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
    if (i === idx) el.scrollIntoView({ block: 'nearest' });
  });

  highlightInBib(e);

  document.getElementById('no-entry-msg').style.display = 'none';
  const aw = document.getElementById('active-workflow');
  aw.style.display = 'flex';

  const authShort = e.authors.length > 90 ? e.authors.slice(0, 90) + '…' : e.authors;
  document.getElementById('entry-card').innerHTML =
    `<div class="ec-title">${e.title}</div>` +
    `<div class="ec-meta">` +
    (e.authors ? `<b>作者：</b>${authShort}<br>` : '') +
    (e.year    ? `<b>年份：</b>${e.year}` : '') +
    (e.year && e.venue ? ' &nbsp;·&nbsp; ' : '') +
    (e.venue   ? `<b>来源：</b>${e.venue.slice(0, 80)}` : '') +
    `<br><b>类型：</b>@${e.type} &nbsp;&nbsp; <b>Key：</b><code>${e.key}</code>` +
    `</div>`;

  document.getElementById('key-display').textContent = e.key;
  document.getElementById('new-bib').value = '';
  document.getElementById('progress-text').textContent = `${idx + 1} / ${entries.length}`;
  setFetchStatus('', '');
  resetSteps();
  updateStats();
}

function highlightInBib(entry) {
  const ta = document.getElementById('bib-textarea');
  const text = ta.value;
  const re = new RegExp('@\\w+\\s*\\{\\s*' + escapeRe(entry.key) + '\\s*,', 'i');
  const m = re.exec(text);
  if (!m) return;
  let depth = 0, i = m.index;
  for (; i < text.length; i++) {
    if (text[i] === '{') depth++;
    else if (text[i] === '}') { depth--; if (depth === 0) { i++; break; } }
  }
  ta.focus();
  ta.setSelectionRange(m.index, i);
  const lines = text.slice(0, m.index).split('\n').length;
  const lineH = parseFloat(getComputedStyle(ta).lineHeight) || 17;
  ta.scrollTop = Math.max(0, (lines - 3) * lineH);
}

// ── Undo ──────────────────────────────────────────────────────
function pushHistory() {
  undoHistory.push({
    text: document.getElementById('bib-textarea').value,
    statuses: entries.map(e => ({ key: e.key, status: e.status })),
    idx: currentIdx,
  });
  if (undoHistory.length > 30) undoHistory.shift();
  updateUndoBtn();
}

function undoState() {
  if (!undoHistory.length) { showToast('没有可撤销的操作'); return; }
  const s = undoHistory.pop();
  document.getElementById('bib-textarea').value = s.text;
  reparsePreservingStatus();
  s.statuses.forEach(({ key, status }) => {
    const e = entries.find(x => x.key === key);
    if (e) e.status = status;
  });
  renderEntryList();
  selectEntry(s.idx >= 0 && s.idx < entries.length ? s.idx : currentIdx);
  updateUndoBtn();
  showToast('↩ 已撤销');
}

function updateUndoBtn() {
  const btn = document.getElementById('undo-btn');
  if (!btn) return;
  btn.disabled = undoHistory.length === 0;
  btn.textContent = undoHistory.length > 0 ? `↩ 撤销 (${undoHistory.length})` : '↩ 撤销';
}

// ── Delay setting ─────────────────────────────────────────────
let fetchDelay = parseInt(localStorage.getItem('bib-fetch-delay') || '3');

function setFetchDelay(val) {
  fetchDelay = parseInt(val);
  localStorage.setItem('bib-fetch-delay', fetchDelay);
}

// ── Status line ───────────────────────────────────────────────
function setFetchStatus(cls, html) {
  const el = document.getElementById('fetch-status');
  el.className = 'status-line' + (cls ? ' ' + cls : '');
  el.innerHTML = html;
}

// ── Auto-fetch ────────────────────────────────────────────────
function autoFetchBib() {
  if (currentIdx < 0) return;
  resetSteps();
  setStep(1, 'active');
  setFetchStatus('', '<span class="spinner"></span> 正在打开 Google Scholar…');
  const url = `https://scholar.google.com/scholar?q=${encodeURIComponent(entries[currentIdx].title)}&bib-checker=1&bib-delay=${fetchDelay}`;
  chrome.runtime.sendMessage({ type: 'bib-ext-open-scholar', url }, () => {
    setStep(1, 'done');
    setStep(2, 'active');
    setFetchStatus('', '<span class="spinner"></span> 等待扩展点击 Cite…');
  });
}

// ── Search URL ────────────────────────────────────────────────
function getSearchUrl(service) {
  if (currentIdx < 0) return '';
  const q = encodeURIComponent(entries[currentIdx].title);
  return service === 'scholar'
    ? `https://scholar.google.com/scholar?q=${q}`
    : `https://www.semanticscholar.org/search?q=${q}&sort=Relevance`;
}

// ── Actions ───────────────────────────────────────────────────
function replaceEntry() {
  if (currentIdx < 0) return;
  let newBib = document.getElementById('new-bib').value.trim();
  if (!newBib) { showToast('没有新的 BibTeX 内容'); return; }
  const e = entries[currentIdx];
  if (document.getElementById('keep-key').checked) {
    newBib = newBib.replace(/^(@\w+\s*\{\s*)[\w:._\-]+/, `$1${e.key}`);
  }
  const ta = document.getElementById('bib-textarea');
  const text = ta.value;
  const re = new RegExp('@\\w+\\s*\\{\\s*' + escapeRe(e.key) + '\\s*,', 'i');
  const m = re.exec(text);
  if (!m) { showToast(`找不到 @${e.key}`); return; }
  pushHistory();
  let depth = 0, i = m.index;
  for (; i < text.length; i++) {
    if (text[i] === '{') depth++;
    else if (text[i] === '}') { depth--; if (depth === 0) { i++; break; } }
  }
  ta.value = text.slice(0, m.index) + newBib + text.slice(i);
  reparsePreservingStatus();
  const newIdx = entries.findIndex(x => x.key === e.key);
  if (newIdx !== -1) { entries[newIdx].status = 'replaced'; currentIdx = newIdx; }
  renderEntryList();
  showToast('✅ 条目已替换');
  setTimeout(() => {
    const ni = findNextPending(newIdx !== -1 ? newIdx : currentIdx);
    selectEntry(ni !== -1 ? ni : currentIdx);
  }, 300);
}

function keepOriginal() {
  if (currentIdx < 0) return;
  pushHistory();
  entries[currentIdx].status = 'ok';
  renderEntryList();
  const next = findNextPending(currentIdx);
  selectEntry(next !== -1 ? next : currentIdx);
}

function findNextPending(from) {
  for (let i = from + 1; i < entries.length; i++) {
    if (entries[i].status === 'pending') return i;
  }
  for (let i = 0; i <= from; i++) {
    if (entries[i].status === 'pending') return i;
  }
  return -1;
}

function navigate(dir) {
  const next = currentIdx + dir;
  if (next >= 0 && next < entries.length) selectEntry(next);
}

function updateStats() {
  if (entries.length === 0) { document.getElementById('stats').innerHTML = ''; return; }
  const pending  = entries.filter(e => e.status === 'pending').length;
  const ok       = entries.filter(e => e.status === 'ok').length;
  const replaced = entries.filter(e => e.status === 'replaced').length;
  document.getElementById('stats').innerHTML =
    `<span class="stat-chip pending">⏳ ${pending}</span>` +
    `<span class="stat-chip ok">✅ ${ok}</span>` +
    `<span class="stat-chip replaced">🔄 ${replaced}</span>`;
}

function downloadBib() {
  const text = document.getElementById('bib-textarea').value;
  if (!text.trim()) { showToast('没有内容可下载'); return; }
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([text], { type: 'text/plain;charset=utf-8' }));
  a.download = 'main.bib';
  a.click();
  showToast('正在下载 main.bib');
}

function escapeRe(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._timer);
  el._timer = setTimeout(() => el.classList.remove('show'), 2200);
}

// ── Receive messages from extension ──────────────────────────
chrome.runtime.onMessage.addListener((msg) => {
  if (msg.type === 'scholar-progress') {
    // Mark steps 1..(msg.step-1) as done, msg.step as active
    for (let i = 1; i < msg.step; i++) setStep(i, 'done');
    setStep(msg.step, 'active');
    const labels = ['', '打开 Scholar', '点击 Cite', '点击 BibTeX', '获取内容', '替换条目'];
    setFetchStatus('', `<span class="spinner"></span> 正在执行：${labels[msg.step]}…`);
    return;
  }

  if (msg.type === 'bib-checker-bib') {
    const bib = msg.bib;
    if (!bib || currentIdx < 0) return;
    // Steps 1-4 done, step 5 active
    for (let i = 1; i <= 4; i++) setStep(i, 'done');
    setStep(5, 'active');
    setFetchStatus('', '<span class="spinner"></span> BibTeX 已获取，正在替换…');
    document.getElementById('new-bib').value = bib;
    setTimeout(() => {
      replaceEntry();
      setStep(5, 'done');
      const next = findNextPending(currentIdx);
      if (next !== -1) {
        setFetchStatus('ok', `✅ 已替换，${fetchDelay} 秒后获取下一条…`);
        setTimeout(() => autoFetchBib(), fetchDelay * 1000);
      } else {
        setFetchStatus('ok', '🎉 所有条目已处理完毕');
      }
    }, 400);
  }
});

// ── Keyboard shortcuts ────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); navigate(1); }
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   { e.preventDefault(); navigate(-1); }
  if ((e.ctrlKey || e.metaKey) && e.key === 'z') { e.preventDefault(); undoState(); }
});

// ── Persist bib content ───────────────────────────────────────
let _saveTimer;
function saveBib() {
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(() => {
    localStorage.setItem('bib-checker-content', document.getElementById('bib-textarea').value);
  }, 600);
}

// ── Init ─────────────────────────────────────────────────────
document.getElementById('delay-select').value = fetchDelay;
const _saved = localStorage.getItem('bib-checker-content');
if (_saved) {
  document.getElementById('bib-textarea').value = _saved;
  parseAndRender();
}
</script>
