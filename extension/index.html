<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BibTeX Checker</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #f0f4f8;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  color: #1e293b;
  font-size: 13px;
}

/* ── Header ─────────────────────────────────────────────────── */
header {
  background: linear-gradient(135deg, #1e40af, #2563eb);
  color: white;
  padding: 0 16px;
  height: 44px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
  box-shadow: 0 2px 6px rgba(30,64,175,.4);
}
.header-title { font-size: 14px; font-weight: 700; letter-spacing: -.01em; }
.header-stats { display: flex; gap: 5px; margin-left: 6px; }
.stat-chip {
  border-radius: 20px; padding: 2px 9px; font-size: 11px; font-weight: 700;
  background: rgba(255,255,255,.18);
}
.stat-chip.pending  { color: #fde68a; }
.stat-chip.ok       { color: #6ee7b7; }
.stat-chip.replaced { color: #bfdbfe; }
.hdr-r { margin-left: auto; display: flex; gap: 6px; }
.btn-hdr {
  background: rgba(255,255,255,.18); color: white;
  border: 1px solid rgba(255,255,255,.3);
  border-radius: 5px; padding: 4px 11px;
  font-size: 11px; font-weight: 600; cursor: pointer; transition: background .15s;
}
.btn-hdr:hover { background: rgba(255,255,255,.3); }
.btn-hdr:disabled { opacity: .4; cursor: not-allowed; }

/* ── Main ───────────────────────────────────────────────────── */
.main { display: flex; flex: 1; overflow: hidden; }

/* ── Left: BibTeX editor ─────────────────────────────────────── */
.left {
  width: 38%; display: flex; flex-direction: column;
  border-right: 2px solid #e2e8f0;
  flex-shrink: 0;
  background: #1e2d3e;
}
.panel-hdr {
  padding: 7px 11px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid rgba(255,255,255,.07);
  background: #1a2535;
  flex-shrink: 0;
}
.panel-lbl { font-size: 10px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: .07em; }
.btn-parse {
  background: #3b82f6; color: white; border: none; border-radius: 5px;
  padding: 4px 11px; font-size: 11px; font-weight: 700; cursor: pointer;
  transition: background .15s;
}
.btn-parse:hover { background: #2563eb; }

#bib-textarea {
  flex: 1; resize: none; outline: none; border: none;
  font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
  font-size: 10.5px; line-height: 1.7;
  background: #1e2d3e; color: #94a3b8;
  padding: 10px 12px;
  caret-color: #60a5fa;
}
#bib-textarea::placeholder { color: #334155; }
#bib-textarea::selection { background: #1e40af; }

/* ── Right: workflow ─────────────────────────────────────────── */
.right { flex: 1; display: flex; flex-direction: column; min-width: 0; overflow: hidden; background: #f0f4f8; }

/* Entry list */
.entry-list-wrap {
  background: white;
  border-bottom: 2px solid #e2e8f0;
  max-height: 200px; overflow-y: auto; flex-shrink: 0;
}
.entry-list-wrap::-webkit-scrollbar { width: 4px; }
.entry-list-wrap::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 2px; }

.list-empty { padding: 14px; text-align: center; font-size: 12px; color: #94a3b8; font-style: italic; }

.entry-row {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 12px; cursor: pointer;
  border-bottom: 1px solid #f1f5f9;
  transition: background .1s;
}
.entry-row:last-child { border-bottom: none; }
.entry-row:hover { background: #f8fafc; }
.entry-row.active { background: #eff6ff; border-left: 3px solid #3b82f6; padding-left: 9px; }
.entry-badge { font-size: 13px; flex-shrink: 0; cursor: pointer; transition: transform .1s; user-select: none; }
.entry-badge:hover { transform: scale(1.3); }
.entry-key { font-family: monospace; font-size: 10.5px; color: #94a3b8; width: 120px; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.entry-ttl { font-size: 12px; color: #475569; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
.entry-row.active .entry-key { color: #3b82f6; }
.entry-row.active .entry-ttl { color: #1e40af; font-weight: 500; }

/* Workflow scroll */
.workflow-scroll {
  flex: 1; overflow-y: auto; padding: 12px;
  display: flex; flex-direction: column; gap: 10px;
}
.workflow-scroll::-webkit-scrollbar { width: 4px; }
.workflow-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 2px; }

.no-entry-msg {
  flex: 1; display: flex; align-items: center; justify-content: center;
  color: #cbd5e1; font-style: italic; font-size: 13px;
}

#active-workflow { display: none; flex-direction: column; gap: 10px; }

/* ── Entry card ──────────────────────────────────────────────── */
.entry-card {
  background: white; border-radius: 8px; padding: 11px 14px;
  border: 1px solid #e2e8f0;
  box-shadow: 0 1px 3px rgba(0,0,0,.06);
}
.ec-title { font-size: 13px; font-weight: 600; color: #0f172a; line-height: 1.4; margin-bottom: 5px; }
.ec-meta  { font-size: 11px; color: #64748b; line-height: 1.7; }
.ec-meta code { background: #f1f5f9; border-radius: 3px; padding: 1px 5px; font-size: 10.5px; color: #2563eb; }

/* ── Pipeline card ──────────────────────────────────────────── */
.pipeline-card {
  background: white; border-radius: 8px; padding: 14px;
  border: 1px solid #e2e8f0;
  box-shadow: 0 1px 3px rgba(0,0,0,.06);
}
.pc-top {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 18px;
}
.pc-label { font-size: 10px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: .07em; }
.delay-row { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #94a3b8; }
.delay-row select {
  background: #f8fafc; color: #475569; border: 1px solid #e2e8f0;
  border-radius: 4px; padding: 2px 6px; font-size: 11px; cursor: pointer; outline: none;
}
.delay-row select:focus { border-color: #3b82f6; }

/* Steps track */
.steps-track {
  position: relative;
  display: flex; align-items: flex-start;
  margin-bottom: 18px;
}
.steps-track::before {
  content: '';
  position: absolute;
  top: 16px; left: 16px; right: 16px;
  height: 2px;
  background: #e2e8f0;
  z-index: 0;
}

.step {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  gap: 6px; position: relative; z-index: 1;
}

.step-dot {
  width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  border: 2px solid #e2e8f0;
  background: white;
  font-size: 12px; font-weight: 700; color: #cbd5e1;
  transition: all .35s;
}
.step.active .step-dot {
  border-color: #3b82f6; background: #eff6ff; color: #3b82f6;
  box-shadow: 0 0 0 5px rgba(59,130,246,.12);
  animation: pulse .9s ease-in-out infinite;
}
.step.done .step-dot {
  border-color: #10b981; background: #ecfdf5; color: #10b981;
  box-shadow: none;
}
@keyframes pulse {
  0%,100% { box-shadow: 0 0 0 4px rgba(59,130,246,.15); }
  50%      { box-shadow: 0 0 0 8px rgba(59,130,246,.04); }
}

.step-lbl {
  font-size: 9.5px; text-align: center; line-height: 1.35;
  color: #cbd5e1; white-space: nowrap;
  transition: color .3s;
}
.step.active .step-lbl { color: #3b82f6; font-weight: 600; }
.step.done   .step-lbl { color: #10b981; font-weight: 600; }

@keyframes spin { to { transform: rotate(360deg); } }
.step-spinner {
  width: 14px; height: 14px;
  border: 2px solid #3b82f6; border-top-color: transparent;
  border-radius: 50%; animation: spin .6s linear infinite;
}

/* connector fill when done */
.step-connector {
  position: absolute;
  top: 16px; left: 50%; right: -50%;
  height: 2px; background: #10b981;
  transform-origin: left;
  transform: scaleX(0);
  transition: transform .35s;
  z-index: 0;
}
.step.done .step-connector { transform: scaleX(1); }

/* Start button */
.btn-start {
  width: 100%; padding: 11px;
  background: linear-gradient(135deg, #1d4ed8, #7c3aed);
  color: white; border: none; border-radius: 7px;
  font-size: 13px; font-weight: 700; cursor: pointer;
  letter-spacing: .02em;
  transition: opacity .15s, transform .1s;
  box-shadow: 0 2px 8px rgba(29,78,216,.3);
}
.btn-start:hover { opacity: .88; }
.btn-start:active { transform: scale(.98); }
.btn-start:disabled { opacity: .4; cursor: not-allowed; box-shadow: none; }

/* Status line */
.status-line {
  margin-top: 9px; min-height: 16px;
  font-size: 11.5px; color: #3b82f6;
  display: flex; align-items: center; gap: 6px;
}
.status-line.ok    { color: #059669; }
.status-line.warn  { color: #d97706; }
.status-line.error { color: #dc2626; }
.spinner {
  display: inline-block; width: 11px; height: 11px;
  border: 2px solid currentColor; border-top-color: transparent;
  border-radius: 50%; animation: spin .6s linear infinite; flex-shrink: 0;
}

/* ── Actions card ───────────────────────────────────────────── */
.actions-card {
  background: white; border-radius: 8px; padding: 12px 14px;
  border: 1px solid #e2e8f0;
  box-shadow: 0 1px 3px rgba(0,0,0,.06);
  display: flex; flex-direction: column; gap: 9px;
}
.keep-key-row {
  display: flex; align-items: center; gap: 6px;
  font-size: 11px; color: #64748b;
}
.keep-key-row input[type=checkbox] { accent-color: #3b82f6; cursor: pointer; }
.keep-key-row label { cursor: pointer; }
.keep-key-row code { background: #f1f5f9; border-radius: 3px; padding: 1px 5px; font-size: 10.5px; color: #2563eb; }

.action-row { display: flex; gap: 7px; }
.btn-action {
  flex: 1; padding: 9px; border: none; border-radius: 6px;
  font-size: 13px; font-weight: 700; cursor: pointer; transition: opacity .15s;
}
.btn-action:hover { opacity: .85; }
.btn-replace { background: #059669; color: white; box-shadow: 0 1px 4px rgba(5,150,105,.3); }
.btn-keep    { background: #f1f5f9; color: #475569; border: 1px solid #e2e8f0; }

.nav-row { display: flex; align-items: center; gap: 6px; }
.btn-nav {
  background: white; color: #64748b;
  border: 1px solid #e2e8f0; border-radius: 5px;
  padding: 5px 10px; font-size: 11px; font-weight: 600; cursor: pointer;
  transition: all .15s;
}
.btn-nav:hover { background: #f8fafc; color: #475569; border-color: #cbd5e1; }
.prog-txt { flex: 1; text-align: center; font-size: 11px; color: #94a3b8; font-weight: 600; }

/* ── Toast ──────────────────────────────────────────────────── */
.toast {
  position: fixed; bottom: 20px; left: 50%;
  transform: translateX(-50%) translateY(8px);
  background: #1e293b; color: #f8fafc;
  padding: 8px 20px; border-radius: 8px; font-size: 13px; font-weight: 500;
  opacity: 0; transition: all .2s; pointer-events: none; z-index: 9999;
  white-space: nowrap; box-shadow: 0 4px 16px rgba(0,0,0,.25);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <span class="header-title">📚 BibTeX Checker</span>
  <div class="header-stats" id="stats"></div>
  <div class="hdr-r">
    <button class="btn-hdr" id="download-btn">⬇ 下载 .bib</button>
    <button class="btn-hdr" id="undo-btn" disabled>↩ 撤销</button>
  </div>
</header>

<div class="main">

  <!-- Left: BibTeX source -->
  <div class="left">
    <div class="panel-hdr">
      <span class="panel-lbl">BibTeX 内容</span>
      <button class="btn-parse" id="parse-btn">解析条目 →</button>
    </div>
    <textarea id="bib-textarea" spellcheck="false"
      placeholder="粘贴 .bib 文件内容，自动解析…"></textarea>
  </div>

  <!-- Right: workflow -->
  <div class="right">

    <!-- Entry list -->
    <div class="entry-list-wrap" id="entry-list-wrap">
      <div class="list-empty" id="list-empty">解析条目后开始核查</div>
    </div>

    <!-- Workflow -->
    <div class="workflow-scroll">
      <div class="no-entry-msg" id="no-entry-msg">从上方列表选择一条参考文献</div>

      <div id="active-workflow">

        <!-- Entry info -->
        <div class="entry-card" id="entry-card"></div>

        <!-- Automation pipeline -->
        <div class="pipeline-card">
          <div class="pc-top">
            <span class="pc-label">自动化流程</span>
            <div class="delay-row">
              <span>间隔</span>
              <select id="delay-select">
                <option value="1">1 s</option>
                <option value="2">2 s</option>
                <option value="3" selected>3 s</option>
                <option value="5">5 s</option>
                <option value="10">10 s</option>
              </select>
            </div>
          </div>

          <div class="steps-track">
            <div class="step" id="step-1">
              <div class="step-dot" id="dot-1">1</div>
              <div class="step-lbl">打开<br>Scholar</div>
              <div class="step-connector"></div>
            </div>
            <div class="step" id="step-2">
              <div class="step-dot" id="dot-2">2</div>
              <div class="step-lbl">点击<br>Cite</div>
              <div class="step-connector"></div>
            </div>
            <div class="step" id="step-3">
              <div class="step-dot" id="dot-3">3</div>
              <div class="step-lbl">点击<br>BibTeX</div>
              <div class="step-connector"></div>
            </div>
            <div class="step" id="step-4">
              <div class="step-dot" id="dot-4">4</div>
              <div class="step-lbl">获取<br>内容</div>
              <div class="step-connector"></div>
            </div>
            <div class="step" id="step-5">
              <div class="step-dot" id="dot-5">5</div>
              <div class="step-lbl">替换<br>条目</div>
            </div>
          </div>

          <button class="btn-start" id="autofetch-btn">▶ 开始自动获取</button>
          <div class="status-line" id="fetch-status"></div>
        </div>

        <!-- Actions -->
        <div class="actions-card">
          <div class="keep-key-row">
            <input type="checkbox" id="keep-key" checked>
            <label for="keep-key">保留原始 key：</label>
            <code id="key-display"></code>
          </div>
          <div class="action-row">
            <button class="btn-action btn-replace" id="replace-btn">✅ 替换条目</button>
            <button class="btn-action btn-keep"    id="keep-btn">👍 保持不变</button>
          </div>
          <div class="nav-row">
            <button class="btn-nav" id="prev-btn">← 上一条</button>
            <span class="prog-txt" id="progress-text"></span>
            <button class="btn-nav" id="next-btn">下一条 →</button>
          </div>
        </div>

      </div><!-- /#active-workflow -->
    </div>
  </div>
</div>

<!-- Hidden textarea used internally by replaceEntry() -->
<textarea id="new-bib" style="display:none"></textarea>

<div class="toast" id="toast"></div>

<script src="index.js"></script>
</body>
</html>
