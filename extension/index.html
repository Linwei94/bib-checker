<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BibTeX Checker</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #f0f4f8;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  color: #1e293b;
  font-size: 13px;
}

/* ── Header ─────────────────────────────────────────────── */
header {
  background: linear-gradient(135deg, #1e40af, #2563eb);
  color: white;
  padding: 0 16px;
  height: 44px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
  box-shadow: 0 2px 6px rgba(30,64,175,.4);
}
.header-title { font-size: 14px; font-weight: 700; letter-spacing: -.01em; }
.header-stats { display: flex; gap: 5px; margin-left: 6px; }
.stat-chip {
  border-radius: 20px; padding: 2px 9px; font-size: 11px; font-weight: 700;
  background: rgba(255,255,255,.18);
}
.stat-chip.s-pending  { color: #fde68a; }
.stat-chip.s-diff     { color: #fed7aa; }
.stat-chip.s-done     { color: #6ee7b7; }
.hdr-r { margin-left: auto; display: flex; gap: 6px; }
.btn-hdr {
  background: rgba(255,255,255,.18); color: white;
  border: 1px solid rgba(255,255,255,.3);
  border-radius: 5px; padding: 4px 11px;
  font-size: 11px; font-weight: 600; cursor: pointer; transition: background .15s;
}
.btn-hdr:hover { background: rgba(255,255,255,.3); }
.btn-hdr:disabled { opacity: .4; cursor: not-allowed; }

/* ── Main ───────────────────────────────────────────────── */
.main { display: flex; flex: 1; overflow: hidden; }

/* ── Left: BibTeX editor ───────────────────────────────── */
.left {
  width: 36%; display: flex; flex-direction: column;
  border-right: 2px solid #e2e8f0;
  flex-shrink: 0;
  background: #1e2d3e;
}
.panel-hdr {
  padding: 7px 11px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid rgba(255,255,255,.07);
  background: #1a2535;
  flex-shrink: 0;
}
.panel-lbl { font-size: 10px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: .07em; }
.btn-parse {
  background: #3b82f6; color: white; border: none; border-radius: 5px;
  padding: 4px 11px; font-size: 11px; font-weight: 700; cursor: pointer;
  transition: background .15s;
}
.btn-parse:hover { background: #2563eb; }

#bib-textarea {
  flex: 1; resize: none; outline: none; border: none;
  font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
  font-size: 10.5px; line-height: 1.7;
  background: #1e2d3e; color: #94a3b8;
  padding: 10px 12px;
  caret-color: #60a5fa;
}
#bib-textarea::placeholder { color: #334155; }
#bib-textarea::selection { background: #1e40af; }

/* ── Right: workflow ────────────────────────────────────── */
.right { flex: 1; display: flex; flex-direction: column; min-width: 0; overflow: hidden; background: #f0f4f8; }

/* ── Entry list ─────────────────────────────────────────── */
.entry-list-wrap {
  background: white;
  border-bottom: 1px solid #e2e8f0;
  max-height: 185px; overflow-y: auto; flex-shrink: 0;
}
.entry-list-wrap::-webkit-scrollbar { width: 4px; }
.entry-list-wrap::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 2px; }
.list-empty { padding: 14px; text-align: center; font-size: 12px; color: #94a3b8; font-style: italic; }

.entry-row {
  display: flex; align-items: center; gap: 8px;
  padding: 5px 12px; cursor: pointer;
  border-bottom: 1px solid #f1f5f9;
  transition: background .1s;
}
.entry-row:last-child { border-bottom: none; }
.entry-row:hover { background: #f8fafc; }
.entry-row.active { background: #eff6ff; border-left: 3px solid #3b82f6; padding-left: 9px; }
.entry-status { font-size: 12px; flex-shrink: 0; width: 16px; text-align: center; }
.entry-key { font-family: monospace; font-size: 10.5px; color: #94a3b8; width: 120px; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.entry-ttl { font-size: 12px; color: #475569; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
.entry-row.active .entry-key { color: #3b82f6; }
.entry-row.active .entry-ttl { color: #1e40af; font-weight: 500; }
@keyframes spin { to { transform: rotate(360deg); } }
.entry-spin {
  display: inline-block; width: 10px; height: 10px;
  border: 2px solid #3b82f6; border-top-color: transparent;
  border-radius: 50%; animation: spin .6s linear infinite;
}

/* ── Fetch control bar ──────────────────────────────────── */
.fetch-bar {
  display: none;
  align-items: center; gap: 8px;
  padding: 6px 12px;
  background: white;
  border-bottom: 2px solid #e2e8f0;
  flex-shrink: 0;
}
.btn-batch {
  background: linear-gradient(135deg, #1d4ed8, #7c3aed);
  color: white; border: none; border-radius: 6px;
  padding: 5px 14px; font-size: 12px; font-weight: 700; cursor: pointer;
  white-space: nowrap; transition: opacity .15s;
  box-shadow: 0 1px 6px rgba(29,78,216,.3);
}
.btn-batch:hover { opacity: .88; }
.btn-batch:disabled { opacity: .4; cursor: not-allowed; }
.btn-stop {
  background: #ef4444; color: white; border: none; border-radius: 6px;
  padding: 5px 12px; font-size: 12px; font-weight: 700; cursor: pointer;
  white-space: nowrap; transition: opacity .15s;
}
.btn-stop:hover { opacity: .85; }
.batch-progress { font-size: 11px; color: #64748b; white-space: nowrap; }
.batch-steps { display: flex; align-items: center; gap: 2px; margin-left: 4px; }
.bs-step {
  font-size: 10px; color: #94a3b8; background: #f1f5f9;
  border-radius: 20px; padding: 2px 7px; white-space: nowrap;
  transition: background .2s, color .2s;
}
.bs-step.active {
  background: #eff6ff; color: #3b82f6; font-weight: 700;
  animation: bspulse .9s ease-in-out infinite;
}
.bs-step.done { background: #f0fdf4; color: #10b981; }
@keyframes bspulse {
  0%,100% { opacity: 1; } 50% { opacity: .45; }
}
.bs-arrow { font-size: 9px; color: #cbd5e1; }
.delay-wrap { margin-left: auto; display: flex; align-items: center; gap: 5px; font-size: 11px; color: #94a3b8; white-space: nowrap; }
.delay-wrap select {
  background: #f8fafc; color: #475569; border: 1px solid #e2e8f0;
  border-radius: 4px; padding: 2px 5px; font-size: 11px; cursor: pointer; outline: none;
}
.delay-wrap select:focus { border-color: #3b82f6; }

/* ── Review area ────────────────────────────────────────── */
.review-area {
  flex: 1; overflow: hidden; display: flex; flex-direction: column;
}

.no-sel-msg {
  flex: 1; display: flex; align-items: center; justify-content: center;
  color: #cbd5e1; font-style: italic; font-size: 13px;
}

/* Entry info card (shown while pending/fetching) */
.entry-info {
  display: none; flex-direction: column; gap: 8px;
  padding: 12px; overflow-y: auto; flex: 1;
}
.einfo-card {
  background: white; border-radius: 8px; padding: 11px 14px;
  border: 1px solid #e2e8f0;
  box-shadow: 0 1px 3px rgba(0,0,0,.06);
}
.einfo-title { font-size: 13px; font-weight: 600; color: #0f172a; line-height: 1.4; margin-bottom: 5px; }
.einfo-meta  { font-size: 11px; color: #64748b; line-height: 1.9; }
.einfo-meta code { background: #f1f5f9; border-radius: 3px; padding: 1px 5px; font-size: 10.5px; color: #2563eb; }
.fetch-state-msg {
  background: white; border-radius: 8px; padding: 14px 16px;
  border: 1px solid #e2e8f0; box-shadow: 0 1px 3px rgba(0,0,0,.06);
  font-size: 12.5px; color: #64748b;
  display: flex; align-items: center; gap: 8px;
}
.fetch-state-msg.error { color: #dc2626; border-color: #fecaca; background: #fff1f2; align-items: flex-start; }
.error-body { display: flex; flex-direction: column; gap: 6px; width: 100%; }
.error-reason { font-weight: 600; font-size: 12.5px; }
.error-hint { font-size: 11.5px; color: #7f1d1d; line-height: 1.5; }
.error-actions { display: flex; gap: 8px; margin-top: 4px; }
.btn-error-action {
  font-size: 12px; font-weight: 600; padding: 5px 12px; border-radius: 6px; cursor: pointer;
  border: 1px solid #fca5a5; background: white; color: #dc2626; transition: background .15s;
}
.btn-error-action:hover { background: #fee2e2; }
.btn-error-action.btn-retry { border-color: #93c5fd; color: #1d4ed8; }
.btn-error-action.btn-retry:hover { background: #eff6ff; }
.inline-spin {
  display: inline-block; width: 12px; height: 12px;
  border: 2px solid #3b82f6; border-top-color: transparent;
  border-radius: 50%; animation: spin .6s linear infinite; flex-shrink: 0;
}

/* ── Diff panel ─────────────────────────────────────────── */
#diff-panel {
  display: none; flex-direction: column; flex: 1; overflow: hidden;
}
@keyframes panelExit {
  from { opacity: 1; transform: translateX(0); }
  to   { opacity: 0; transform: translateX(-24px); }
}
@keyframes panelEnter {
  from { opacity: 0; transform: translateX(24px); }
  to   { opacity: 1; transform: translateX(0); }
}
#diff-panel.anim-exit  { animation: panelExit  140ms ease-in  forwards; pointer-events: none; }
#diff-panel.anim-enter { animation: panelEnter 180ms ease-out forwards; }

.diff-topbar {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 12px;
  background: white;
  border-bottom: 1px solid #e2e8f0;
  flex-shrink: 0;
}
.diff-entry-key {
  font-family: monospace; font-size: 11px;
  background: #eff6ff; color: #1d4ed8;
  border-radius: 4px; padding: 2px 8px; font-weight: 700;
}
.diff-type-badge {
  font-size: 10px; color: #64748b;
  background: #f1f5f9; border-radius: 3px; padding: 2px 6px; font-weight: 600;
}
.diff-change-indicator {
  font-size: 11px; font-weight: 600;
}
.diff-change-indicator.has-changes { color: #d97706; }
.diff-change-indicator.no-changes  { color: #059669; }
.diff-nav { margin-left: auto; display: flex; align-items: center; gap: 4px; }
.btn-diff-nav {
  background: white; color: #64748b;
  border: 1px solid #e2e8f0; border-radius: 5px;
  padding: 4px 9px; font-size: 11px; font-weight: 600; cursor: pointer;
  transition: all .15s;
}
.btn-diff-nav:hover { background: #f8fafc; border-color: #cbd5e1; }
.btn-diff-nav:disabled { opacity: .35; cursor: not-allowed; }
.diff-nav-cnt { font-size: 11px; color: #94a3b8; font-weight: 600; padding: 0 4px; }

.diff-table-scroll {
  flex: 1; overflow-y: auto; padding: 8px 12px;
}
.diff-table-scroll::-webkit-scrollbar { width: 4px; }
.diff-table-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 2px; }

.diff-table {
  width: 100%; border-collapse: collapse; font-size: 11.5px;
  background: white; border-radius: 8px; overflow: hidden;
  border: 1px solid #e2e8f0;
  box-shadow: 0 1px 3px rgba(0,0,0,.05);
}
.diff-table th {
  padding: 7px 10px; background: #f8fafc;
  text-align: left; font-size: 10px; font-weight: 700;
  color: #64748b; text-transform: uppercase; letter-spacing: .05em;
  border-bottom: 2px solid #e2e8f0;
}
.diff-table th:first-child { width: 100px; }
.diff-table th:nth-child(2), .diff-table th:nth-child(3) { width: calc(50% - 50px); }
.diff-table td {
  padding: 6px 10px; vertical-align: top;
  border-bottom: 1px solid #f1f5f9;
  line-height: 1.55; word-break: break-word;
}
.diff-table tr:last-child td { border-bottom: none; }
.td-field {
  font-family: monospace; font-size: 10.5px; font-weight: 700;
  color: #94a3b8; white-space: nowrap;
}

/* Row styles */
.row-same td { background: white; color: #64748b; }
.row-same .td-field { color: #cbd5e1; }
.row-changed .td-old  { background: #fef9ee; color: #92400e; }
.row-changed .td-new  { background: #f0fdf4; color: #065f46; }
.row-changed .td-field { color: #d97706; }
/* Word-level diff highlights within changed cells */
.hl-old { background: #fbbf24; color: #78350f; border-radius: 2px; padding: 0 2px; font-weight: 600; }
.hl-new { background: #34d399; color: #064e3b; border-radius: 2px; padding: 0 2px; font-weight: 600; }
.row-added .td-field   { color: #2563eb; }
.row-added .td-old     { background: white; color: #cbd5e1; }
.row-added .td-new     { background: #eff6ff; color: #1e40af; }
.row-missing .td-field { color: #94a3b8; }
.row-missing .td-old   { background: white; color: #94a3b8; }
.row-missing .td-new   { background: white; color: #cbd5e1; font-style: italic; }

/* ── Diff actions bar ───────────────────────────────────── */
.diff-actions {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px;
  background: white;
  border-top: 2px solid #e2e8f0;
  flex-shrink: 0;
}
.keep-key-label {
  display: flex; align-items: center; gap: 5px;
  font-size: 11px; color: #64748b; cursor: pointer; white-space: nowrap;
}
.keep-key-label input { accent-color: #3b82f6; cursor: pointer; }
.keep-key-label code { background: #f1f5f9; border-radius: 3px; padding: 1px 5px; font-size: 10.5px; color: #2563eb; }
.action-btns { margin-left: auto; display: flex; gap: 7px; }
.btn-keep {
  background: #f1f5f9; color: #475569;
  border: 1px solid #e2e8f0; border-radius: 6px;
  padding: 7px 16px; font-size: 12px; font-weight: 700; cursor: pointer;
  transition: background .15s;
}
.btn-keep:hover { background: #e2e8f0; }
.btn-replace {
  background: #059669; color: white; border: none; border-radius: 6px;
  padding: 7px 16px; font-size: 12px; font-weight: 700; cursor: pointer;
  box-shadow: 0 1px 4px rgba(5,150,105,.3);
  transition: opacity .15s;
}
.btn-replace:hover { opacity: .85; }
.btn-replace:disabled, .btn-keep:disabled { opacity: .4; cursor: not-allowed; }
.btn-replace-all {
  background: #059669; color: white; border: none; border-radius: 6px;
  padding: 5px 14px; font-size: 12px; font-weight: 700; cursor: pointer;
  white-space: nowrap; transition: opacity .15s;
  box-shadow: 0 1px 5px rgba(5,150,105,.35);
}
.btn-replace-all:hover { opacity: .85; }
@keyframes btnFlash {
  0%   { transform: scale(1); }
  40%  { transform: scale(1.08); }
  100% { transform: scale(1); }
}
.btn-flash { animation: btnFlash 160ms ease-out; }

/* ── Toast ──────────────────────────────────────────────── */
.toast {
  position: fixed; bottom: 20px; left: 50%;
  transform: translateX(-50%) translateY(8px);
  background: #1e293b; color: #f8fafc;
  padding: 8px 20px; border-radius: 8px; font-size: 13px; font-weight: 500;
  opacity: 0; transition: all .2s; pointer-events: none; z-index: 9999;
  white-space: nowrap; box-shadow: 0 4px 16px rgba(0,0,0,.25);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <span class="header-title">📚 BibTeX Checker</span>
  <div class="header-stats" id="stats"></div>
  <div class="hdr-r">
    <button class="btn-hdr" id="download-btn">⬇ 下载 .bib</button>
    <button class="btn-hdr" id="undo-btn" disabled>↩ 撤销</button>
  </div>
</header>

<div class="main">

  <!-- Left: BibTeX source -->
  <div class="left">
    <div class="panel-hdr">
      <span class="panel-lbl">BibTeX 内容</span>
      <button class="btn-parse" id="parse-btn">解析条目 →</button>
    </div>
    <textarea id="bib-textarea" spellcheck="false"
      placeholder="粘贴 .bib 文件内容，自动解析…"></textarea>
  </div>

  <!-- Right: two-phase workflow -->
  <div class="right">

    <!-- Entry list -->
    <div class="entry-list-wrap" id="entry-list-wrap">
      <div class="list-empty" id="list-empty">解析条目后开始核查</div>
    </div>

    <!-- Batch fetch control bar -->
    <div class="fetch-bar" id="fetch-bar">
      <button class="btn-batch" id="batch-start-btn">▶ 开始批量获取</button>
      <button class="btn-stop" id="batch-stop-btn" style="display:none">■ 停止</button>
      <span class="batch-progress" id="batch-progress"></span>
      <div class="batch-steps" id="batch-steps" style="display:none">
        <div class="bs-step" id="bs1">打开 Scholar</div>
        <span class="bs-arrow">›</span>
        <div class="bs-step" id="bs2">点击 Cite</div>
        <span class="bs-arrow">›</span>
        <div class="bs-step" id="bs3">点击 BibTeX</div>
        <span class="bs-arrow">›</span>
        <div class="bs-step" id="bs4">下载内容</div>
      </div>
      <button class="btn-replace-all" id="replace-all-btn" style="display:none">⚡ 全部替换</button>
      <div class="delay-wrap">
        <span>间隔</span>
        <select id="delay-select">
          <option value="1">1 s</option>
          <option value="2">2 s</option>
          <option value="3" selected>3 s</option>
          <option value="5">5 s</option>
          <option value="10">10 s</option>
        </select>
      </div>
    </div>

    <!-- Review area -->
    <div class="review-area" id="review-area">

      <!-- Placeholder when nothing selected -->
      <div class="no-sel-msg" id="no-sel-msg">从上方列表选择一条参考文献</div>

      <!-- Entry info (shown when pending/fetching/error) -->
      <div class="entry-info" id="entry-info">
        <div class="einfo-card" id="einfo-card"></div>
        <div class="fetch-state-msg" id="fetch-state-msg"></div>
      </div>

      <!-- Diff panel (shown when fetch result is available) -->
      <div id="diff-panel">
        <div class="diff-topbar">
          <span class="diff-entry-key" id="diff-key-label"></span>
          <span class="diff-type-badge" id="diff-type-label"></span>
          <span class="diff-change-indicator" id="diff-change-indicator"></span>
          <div class="diff-nav">
            <button class="btn-diff-nav" id="diff-prev-btn">← 上条差异</button>
            <span class="diff-nav-cnt" id="diff-nav-cnt"></span>
            <button class="btn-diff-nav" id="diff-next-btn">下条差异 →</button>
          </div>
        </div>

        <div class="diff-table-scroll">
          <table class="diff-table">
            <thead>
              <tr>
                <th>字段</th>
                <th>原始</th>
                <th>Scholar</th>
              </tr>
            </thead>
            <tbody id="diff-tbody"></tbody>
          </table>
        </div>

        <div class="diff-actions">
          <label class="keep-key-label">
            <input type="checkbox" id="keep-key" checked>
            保留原始 key：<code id="key-display"></code>
          </label>
          <div class="action-btns">
            <button class="btn-keep" id="keep-btn">👍 保持原样</button>
            <button class="btn-replace" id="replace-btn">✅ 替换</button>
          </div>
        </div>
      </div>

    </div><!-- /.review-area -->
  </div><!-- /.right -->
</div><!-- /.main -->

<div class="toast" id="toast"></div>
<script src="index.js"></script>
</body>
</html>
